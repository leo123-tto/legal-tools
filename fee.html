<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>律师费计算器 - 法律工具集</title>
    <style>
        :root {
            --bg-primary: #F0F1F5;
            --text-primary: #1A1D2E;
            --text-secondary: rgba(60, 68, 90, 0.8);
            --text-tertiary: rgba(100, 110, 135, 0.65);
            --accent: #4F6AF0;
            --accent-hover: #3D56D4;
            --accent-light: rgba(79, 106, 240, 0.08);
            --accent-gradient: linear-gradient(135deg, #4F6AF0 0%, #9B6FE8 100%);
            --border: rgba(80, 90, 130, 0.12);
            --focus-ring: rgba(79, 106, 240, 0.15);
            --radius-lg: 20px;
            --radius-md: 14px;
            --radius-sm: 10px;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
            --shadow-hover: 0 8px 32px rgba(0, 0, 0, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(180deg, #EDF0F8 0%, #F0F1F5 100%);
            min-height: 100vh;
            min-height: 100dvh;
            color: var(--text-primary);
            line-height: 1.5;
            overflow-x: hidden;
        }

        .page {
            max-width: 420px;
            margin: 0 auto;
            padding: 16px 16px env(safe-area-inset-bottom, 20px);
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-height: 100vh;
            min-height: 100dvh;
        }

        /* Nav */
        .nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .back-link {
            font-size: 13px;
            color: var(--accent);
            text-decoration: none;
            padding: 6px 12px;
            background: rgba(79, 106, 240, 0.06);
            border-radius: 20px;
            transition: all 0.2s;
            font-weight: 500;
        }

        .back-link:active {
            background: rgba(79, 106, 240, 0.15);
            transform: scale(0.96);
        }

        .nav-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .nav-spacer { width: 72px; }

        /* Header */
        .header {
            text-align: center;
            padding: 4px 0 2px;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 800;
            color: var(--text-primary);
            letter-spacing: -0.3px;
        }

        .header p {
            font-size: 12px;
            color: var(--text-tertiary);
            margin-top: 4px;
            font-weight: 500;
        }

        /* Segment control */
        .segment {
            display: flex;
            background: rgba(0, 0, 0, 0.05);
            border-radius: var(--radius-sm);
            padding: 3px;
        }

        .seg-btn {
            flex: 1;
            padding: 9px 8px;
            border: none;
            background: transparent;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.22s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
        }

        .seg-btn.active {
            background: white;
            color: var(--accent);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        .seg-btn:active { transform: scale(0.97); }

        /* Main card */
        .card {
            background: white;
            border-radius: var(--radius-lg);
            padding: 20px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(80, 90, 130, 0.06);
        }

        /* Field */
        .field {
            margin-bottom: 16px;
        }

        .field:last-child { margin-bottom: 0; }

        .field-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .field-label::before {
            content: '';
            width: 3px;
            height: 13px;
            background: var(--accent-gradient);
            border-radius: 2px;
            flex-shrink: 0;
        }

        /* Amount input */
        .amount-row {
            display: flex;
            align-items: stretch;
            border: 2px solid rgba(80, 90, 130, 0.12);
            border-radius: var(--radius-sm);
            overflow: hidden;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: rgba(240, 242, 248, 0.8);
        }

        .amount-row:focus-within {
            border-color: var(--accent);
            background: white;
            box-shadow: 0 0 0 3px var(--focus-ring);
        }

        .amount-input {
            flex: 1;
            padding: 14px 12px;
            font-size: 22px;
            font-weight: 700;
            border: none;
            outline: none;
            background: transparent;
            color: var(--text-primary);
            min-width: 0;
            -moz-appearance: textfield;
        }

        .amount-input::-webkit-outer-spin-button,
        .amount-input::-webkit-inner-spin-button { -webkit-appearance: none; }

        .amount-suffix {
            padding: 14px 14px 14px 4px;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-secondary);
            align-self: center;
            white-space: nowrap;
        }

        /* Difficulty selector */
        .difficulty-group {
            display: flex;
            gap: 8px;
        }

        .diff-btn {
            flex: 1;
            padding: 10px 4px;
            border: 2px solid rgba(80, 90, 130, 0.12);
            background: rgba(240, 242, 248, 0.8);
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.18s;
            text-align: center;
        }

        .diff-btn.active {
            border-color: var(--accent);
            background: var(--accent-light);
            color: var(--accent);
        }

        .diff-btn:active { transform: scale(0.96); }

        /* Result card */
        .result-card {
            background: var(--accent-gradient);
            border-radius: var(--radius-lg);
            padding: 20px;
            box-shadow: 0 6px 24px rgba(79, 106, 240, 0.18);
            display: none;
        }

        .result-card.visible { display: block; }

        .result-label {
            font-size: 11px;
            font-weight: 700;
            color: rgba(255,255,255,0.65);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .result-main {
            font-size: 30px;
            font-weight: 800;
            color: white;
            letter-spacing: -0.5px;
            margin-bottom: 2px;
        }

        .result-sub {
            font-size: 12px;
            color: rgba(255,255,255,0.65);
            margin-bottom: 16px;
        }

        /* Grid for risk mode */
        .result-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 14px;
        }

        .result-grid-item {
            background: rgba(255,255,255,0.12);
            border-radius: var(--radius-sm);
            padding: 12px 10px;
        }

        .grid-item-label {
            font-size: 10px;
            color: rgba(255,255,255,0.6);
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .grid-item-value {
            font-size: 16px;
            font-weight: 800;
            color: white;
        }

        /* Detail list */
        .detail-list {
            border-top: 1px solid rgba(255,255,255,0.15);
            padding-top: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .detail-key {
            font-size: 12px;
            color: rgba(255,255,255,0.65);
            font-weight: 500;
        }

        .detail-val {
            font-size: 13px;
            color: white;
            font-weight: 700;
        }

        /* Range row for fixed mode */
        .range-row {
            display: flex;
            gap: 10px;
            margin-bottom: 14px;
        }

        .range-item {
            flex: 1;
            background: rgba(255,255,255,0.12);
            border-radius: var(--radius-sm);
            padding: 10px;
            text-align: center;
        }

        .range-item-label {
            font-size: 10px;
            color: rgba(255,255,255,0.6);
            font-weight: 600;
            margin-bottom: 4px;
        }

        .range-item-value {
            font-size: 14px;
            font-weight: 800;
            color: white;
        }

        /* Empty state */
        .empty-hint {
            text-align: center;
            padding: 20px 0 4px;
            font-size: 13px;
            color: var(--text-tertiary);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .empty-hint .hint-icon {
            font-size: 28px;
            opacity: 0.5;
        }

        /* Footer */
        .footer {
            margin-top: auto;
            padding-top: 8px;
            text-align: center;
            font-size: 11px;
            color: var(--text-tertiary);
            line-height: 1.6;
        }
    </style>
</head>
<body>
<div class="page">

    <!-- Nav -->
    <nav class="nav">
        <a href="index.html" class="back-link">← 返回</a>
        <span class="nav-title">费用计算</span>
        <span class="nav-spacer"></span>
    </nav>

    <!-- Header -->
    <div class="header">
        <h1>律师费报价方案</h1>
        <p>江苏漫修（无锡）律师事务所 · 刘成律师</p>
    </div>

    <!-- Mode switch -->
    <div class="segment" role="tablist">
        <button class="seg-btn active" id="tab-fixed" role="tab" aria-selected="true" onclick="switchMode('fixed')">一口价</button>
        <button class="seg-btn" id="tab-risk" role="tab" aria-selected="false" onclick="switchMode('risk')">基础 + 风险</button>
    </div>

    <!-- Input card -->
    <div class="card">
        <div class="field">
            <div class="field-label">案件标的额</div>
            <div class="amount-row">
                <input
                    id="amountInput"
                    class="amount-input"
                    type="number"
                    inputmode="decimal"
                    placeholder="0"
                    min="0"
                    autocomplete="off"
                    oninput="onAmountInput()"
                />
                <span class="amount-suffix">万元</span>
            </div>
        </div>

        <div class="field" id="difficultyField" style="display:none; margin-bottom:0;">
            <div class="field-label">案件难度</div>
            <div class="difficulty-group">
                <button class="diff-btn active" id="diff-simple" onclick="switchDiff('simple')">简单</button>
                <button class="diff-btn" id="diff-normal" onclick="switchDiff('normal')">一般</button>
                <button class="diff-btn" id="diff-hard" onclick="switchDiff('hard')">困难</button>
            </div>
        </div>
    </div>

    <!-- Result card -->
    <div class="result-card" id="resultCard">
        <!-- populated by JS -->
    </div>

    <!-- Empty hint -->
    <div class="empty-hint" id="emptyHint">
        <span class="hint-hint-icon hint-icon">💼</span>
        <span>输入标的额，自动生成报价方案</span>
    </div>

    <!-- Footer -->
    <footer class="footer">
        江苏漫修（无锡）律师事务所&nbsp;&nbsp;刘成律师<br>
        <span style="opacity:0.6;">仅供参考，实际收费以委托合同为准</span>
    </footer>

</div>

<script>
    // ── Business logic ──────────────────────────────────────────────
    function calculateFixed(amount) {
        if (amount <= 0) return 0;
        if (amount <= 1) return 1;
        if (amount <= 20) return Math.max(1, amount * 0.10);
        if (amount <= 50) return 2 + (amount - 20) * 0.05;
        if (amount <= 100) return 3.5 + (amount - 50) * 0.03;
        if (amount <= 250) return 5 + (amount - 100) * 0.04;
        if (amount <= 500) return 11 + (amount - 250) * 0.028;
        if (amount <= 1000) return 18 + (amount - 500) * 0.02;
        return 28 + (amount - 1000) * 0.015;
    }

    function calculateRiskTotal(amount) {
        return calculateFixed(amount) * 1.8;
    }

    function formatMoney(num) {
        const rounded = Math.round(num * 2) / 2;
        if (rounded >= 10000) return (rounded / 10000).toFixed(2) + ' 亿元';
        else if (rounded >= 100) return Math.round(rounded) + ' 万元';
        else if (rounded >= 1) return rounded.toFixed(1) + ' 万元';
        else return rounded.toFixed(2) + ' 万元';
    }

    const DIFFICULTY = {
        simple: { riskRate: 7,  expectRate: 90, ratio: [30, 70], label: '简单案件' },
        normal: { riskRate: 10, expectRate: 60, ratio: [40, 60], label: '一般案件' },
        hard:   { riskRate: 15, expectRate: 20, ratio: [50, 50], label: '困难案件' },
    };

    // ── State ────────────────────────────────────────────────────────
    let mode = 'fixed';      // 'fixed' | 'risk'
    let difficulty = 'simple';
    let debounceTimer = null;

    // ── UI helpers ───────────────────────────────────────────────────
    function switchMode(m) {
        mode = m;
        document.getElementById('tab-fixed').classList.toggle('active', m === 'fixed');
        document.getElementById('tab-risk').classList.toggle('active', m === 'risk');
        document.getElementById('tab-fixed').setAttribute('aria-selected', m === 'fixed');
        document.getElementById('tab-risk').setAttribute('aria-selected', m === 'risk');
        document.getElementById('difficultyField').style.display = m === 'risk' ? 'block' : 'none';
        calculate();
    }

    function switchDiff(d) {
        difficulty = d;
        ['simple', 'normal', 'hard'].forEach(k => {
            document.getElementById('diff-' + k).classList.toggle('active', k === d);
        });
        calculate();
    }

    function onAmountInput() {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(calculate, 300);
    }

    // ── Core calculation + render ────────────────────────────────────
    function calculate() {
        const raw = parseFloat(document.getElementById('amountInput').value);
        const resultCard = document.getElementById('resultCard');
        const emptyHint  = document.getElementById('emptyHint');

        if (!raw || isNaN(raw) || raw <= 0) {
            resultCard.classList.remove('visible');
            emptyHint.style.display = 'flex';
            return;
        }

        resultCard.classList.add('visible');
        emptyHint.style.display = 'none';

        if (mode === 'fixed') {
            renderFixed(raw);
        } else {
            renderRisk(raw);
        }
    }

    function renderFixed(amount) {
        const fee   = calculateFixed(amount);
        const low   = fee * 0.8;
        const high  = fee * 1.2;

        document.getElementById('resultCard').innerHTML = `
            <div class="result-label">一口价 · 建议报价</div>
            <div class="result-main">${formatMoney(fee)}</div>
            <div class="result-sub">标的额 ${amount} 万元 · 固定收费模式</div>
            <div class="range-row">
                <div class="range-item">
                    <div class="range-item-label">浮动下限 ×0.8</div>
                    <div class="range-item-value">${formatMoney(low)}</div>
                </div>
                <div class="range-item">
                    <div class="range-item-label">浮动上限 ×1.2</div>
                    <div class="range-item-value">${formatMoney(high)}</div>
                </div>
            </div>
            <div class="detail-list">
                <div class="detail-row">
                    <span class="detail-key">合理区间</span>
                    <span class="detail-val">${formatMoney(low)} ~ ${formatMoney(high)}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-key">计费基准</span>
                    <span class="detail-val">${amount} 万元标的额</span>
                </div>
                <div class="detail-row">
                    <span class="detail-key">收费方式</span>
                    <span class="detail-val">一次性固定收费</span>
                </div>
            </div>
        `;
    }

    function renderRisk(amount) {
        const d = DIFFICULTY[difficulty];
        const totalExpected = calculateRiskTotal(amount);

        const basePercent   = d.ratio[0];                          // base share %
        const baseFee       = totalExpected * (basePercent / 100);

        const expectAmount  = amount * (d.expectRate / 100);
        const actualRiskFee = expectAmount * (d.riskRate / 100);

        const total = baseFee + actualRiskFee;

        document.getElementById('resultCard').innerHTML = `
            <div class="result-label">基础 + 风险 · ${d.label}</div>
            <div class="result-main">${formatMoney(total)}</div>
            <div class="result-sub">标的额 ${amount} 万元 · 混合收费模式</div>
            <div class="result-grid">
                <div class="result-grid-item">
                    <div class="grid-item-label">基础服务费</div>
                    <div class="grid-item-value">${formatMoney(baseFee)}</div>
                </div>
                <div class="result-grid-item">
                    <div class="grid-item-label">风险代理费率</div>
                    <div class="grid-item-value">${d.riskRate}%</div>
                </div>
            </div>
            <div class="detail-list">
                <div class="detail-row">
                    <span class="detail-key">预期回收金额</span>
                    <span class="detail-val">${formatMoney(expectAmount)}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-key">基础服务费（${basePercent}%）</span>
                    <span class="detail-val">${formatMoney(baseFee)}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-key">风险代理费（${d.riskRate}%）</span>
                    <span class="detail-val">${formatMoney(actualRiskFee)}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-key">合计收费</span>
                    <span class="detail-val">${formatMoney(total)}</span>
                </div>
            </div>
        `;
    }
</script>
</body>
</html>
