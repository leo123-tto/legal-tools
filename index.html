<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>刘成律师 · 法律工具集</title>
  <style>
    :root {
      --accent: #4F6AF0;
      --accent-light: #6B82F5;
      --accent-bg: rgba(79, 106, 240, 0.06);
      --text-primary: #1A1D2E;
      --text-secondary: rgba(60, 68, 90, 0.8);
      --card-bg: rgba(255, 255, 255, 0.88);
      --shadow: 0 2px 8px rgba(79, 106, 240, 0.06);
      --shadow-hover: 0 6px 20px rgba(79, 106, 240, 0.14);
      --radius: 16px;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB",
                   "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(180deg, #EDF0F8 0%, #F0F1F5 100%);
      background-attachment: fixed;
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      padding: 18px 20px 14px;
      text-align: center;
    }

    .header-icon {
      font-size: 32px;
      line-height: 1;
      margin-bottom: 6px;
      display: block;
    }

    header h1 {
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.01em;
      line-height: 1.3;
    }

    header p {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 3px;
      letter-spacing: 0.02em;
    }

    /* ── Grid ── */
    main {
      flex: 1;
      padding: 0 14px 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    @media (min-width: 480px) {
      .grid {
        grid-template-columns: 1fr 1fr 1fr;
      }
    }

    /* ── Card ── */
    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px 10px 16px;
      text-decoration: none;
      color: inherit;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
      -webkit-tap-highlight-color: transparent;
      cursor: pointer;
      border: 1.5px solid transparent;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(79, 106, 240, 0.15);
    }

    .card:active {
      transform: translateY(0) scale(0.97);
      box-shadow: var(--shadow);
      background: var(--accent-bg);
    }

    .card-icon {
      font-size: 28px;
      line-height: 1;
    }

    .card-name {
      font-size: 13.5px;
      font-weight: 600;
      color: var(--text-primary);
      text-align: center;
      line-height: 1.3;
    }

    .card-desc {
      font-size: 11px;
      color: var(--text-secondary);
      text-align: center;
      line-height: 1.4;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 10px 20px 14px;
      font-size: 11px;
      color: var(--text-secondary);
      letter-spacing: 0.01em;
    }
  </style>
</head>
<body>

  <header>
    <span class="header-icon">⚖️</span>
    <h1>刘成律师 · 法律工具集</h1>
    <p>江苏漫修（无锡）律师事务所</p>
  </header>

  <main>
    <div class="grid">

      <a class="card" href="fee.html">
        <span class="card-icon">💰</span>
        <span class="card-name">律师费计算器</span>
        <span class="card-desc">快速估算代理费用</span>
      </a>

      <a class="card" href="legalfee.html">
        <span class="card-icon">🏛️</span>
        <span class="card-name">诉讼费计算器</span>
        <span class="card-desc">法院诉讼费用测算</span>
      </a>

      <a class="card" href="daycal.html">
        <span class="card-icon">📅</span>
        <span class="card-name">天数计算器</span>
        <span class="card-desc">日期区间天数统计</span>
      </a>

      <a class="card" href="number.html">
        <span class="card-icon">🔢</span>
        <span class="card-name">数字大写转换</span>
        <span class="card-desc">金额转中文大写</span>
      </a>

      <a class="card" href="highway-drive-game-vertical/index.html">
        <span class="card-icon">🚗</span>
        <span class="card-name">高速自驾游</span>
        <span class="card-desc">趣味驾驶小游戏</span>
      </a>

      <a class="card" href="html-editor/index.html">
        <span class="card-icon">✏️</span>
        <span class="card-name">HTML编辑器</span>
        <span class="card-desc">可视化网页编辑</span>
      </a>

    </div>
  </main>

  <footer>
    江苏漫修（无锡）律师事务所 · 刘成律师 · © 2026
  </footer>

</body>
</html>
