<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>天数计算器 - 法律工具集</title>
    <style>
        :root {
            --bg-deep: #F0F1F5;
            --bg-card: rgba(255, 255, 255, 0.88);
            --bg-input: rgba(240, 242, 248, 0.8);
            --bg-input-focus: rgba(232, 236, 248, 0.95);
            --text-primary: #1A1D2E;
            --text-secondary: rgba(60, 68, 90, 0.8);
            --text-dim: rgba(100, 110, 135, 0.65);
            --accent: #4F6AF0;
            --accent-bright: #4F6AF0;
            --accent-glow: rgba(79, 106, 240, 0.15);
            --accent-gradient: linear-gradient(135deg, #4F6AF0 0%, #9B6FE8 100%);
            --accent-gradient-bright: linear-gradient(135deg, #4F6AF0 0%, #9B6FE8 100%);
            --border: rgba(80, 90, 130, 0.12);
            --border-focus: rgba(79, 106, 240, 0.45);
            --glass: rgba(255, 255, 255, 0.5);
            --success: #10B981;
            --success-glow: rgba(16, 185, 129, 0.25);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-deep);
            min-height: 100vh;
            min-height: 100dvh;
            color: var(--text-primary);
            line-height: 1.5;
            overflow-x: hidden;
        }

        /* 背景动效 */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(79, 106, 240, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 80% 100%, rgba(155, 111, 232, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse 40% 30% at 10% 80%, rgba(79, 106, 240, 0.04) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* 网格背景 */
        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image:
                linear-gradient(rgba(79, 106, 240, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(79, 106, 240, 0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .page {
            position: relative;
            z-index: 1;
            max-width: 440px;
            margin: 0 auto;
            padding: 16px 16px env(safe-area-inset-bottom, 16px);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            min-height: 100dvh;
        }

        /* 顶部导航 */
        .nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .back-link {
            font-size: 13px;
            color: var(--accent);
            text-decoration: none;
            padding: 7px 14px;
            background: rgba(79, 106, 240, 0.08);
            border: 1px solid rgba(79, 106, 240, 0.15);
            border-radius: 20px;
            transition: all 0.2s;
            font-weight: 500;
            backdrop-filter: blur(10px);
        }

        .back-link:active {
            background: rgba(79, 106, 240, 0.15);
            transform: scale(0.96);
        }

        .nav-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.3px;
        }

        .nav-spacer { width: 72px; }

        /* 模式切换 - 胶囊风格 */
        .mode-switch {
            display: flex;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 4px;
            margin-bottom: 16px;
            backdrop-filter: blur(20px);
            position: relative;
        }

        .mode-slider {
            position: absolute;
            top: 4px;
            left: 4px;
            width: calc(50% - 4px);
            height: calc(100% - 8px);
            background: var(--accent-gradient);
            border-radius: 11px;
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 2px 8px rgba(79, 106, 240, 0.25);
        }

        .mode-slider.right {
            transform: translateX(100%);
        }

        .mode-tab {
            flex: 1;
            padding: 12px 8px;
            border: none;
            background: transparent;
            border-radius: 11px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            transition: color 0.3s;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .mode-tab.active {
            color: white;
        }

        .mode-tab:active { transform: scale(0.97); }

        /* 主卡片 - 玻璃拟态 */
        .card {
            background: var(--bg-card);
            backdrop-filter: blur(24px);
            border-radius: 20px;
            padding: 24px 20px;
            border: 1px solid var(--border);
            box-shadow:
                0 4px 24px rgba(0, 0, 0, 0.04),
                0 1px 3px rgba(0, 0, 0, 0.06);
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* 表单区块 */
        .field { margin-bottom: 20px; }

        .field-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .field-label .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent-gradient);
            box-shadow: 0 0 8px var(--accent-glow);
        }

        /* 日期输入组 */
        .date-row {
            display: flex;
            gap: 8px;
            align-items: center;
            max-width: 100%;
            overflow: hidden;
        }

        .date-group {
            flex: 1;
            min-width: 0;
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .date-field {
            flex: 1;
            min-width: 0;
            width: 0;
            padding: 12px 4px;
            font-size: 16px;
            font-weight: 700;
            font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
            letter-spacing: 0.5px;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            outline: none;
            transition: all 0.25s;
            background: var(--bg-input);
            color: var(--text-primary);
            text-align: center;
            -moz-appearance: textfield;
            backdrop-filter: blur(10px);
        }

        .date-field::-webkit-outer-spin-button,
        .date-field::-webkit-inner-spin-button {
            -webkit-appearance: none;
        }

        .date-field::placeholder {
            color: var(--text-dim);
            font-weight: 500;
            font-size: 13px;
            letter-spacing: 0;
        }

        .date-field:focus {
            border-color: var(--border-focus);
            background: var(--bg-input-focus);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .date-field.year { flex: 1.4; }

        .date-sep {
            color: var(--text-dim);
            font-size: 16px;
            font-weight: 300;
            flex-shrink: 0;
        }

        /* 今天按钮 */
        .today-btn {
            padding: 12px 10px;
            border: 1.5px solid rgba(79, 106, 240, 0.2);
            background: linear-gradient(135deg, rgba(79, 106, 240, 0.08) 0%, rgba(155, 111, 232, 0.06) 100%);
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            color: var(--accent);
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            flex-shrink: 0;
            backdrop-filter: blur(10px);
            letter-spacing: 0.5px;
        }

        .today-btn:active {
            transform: scale(0.93);
            background: rgba(79, 106, 240, 0.15);
        }

        /* 天数输入行 */
        .days-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .dir-group {
            display: flex;
            gap: 4px;
        }

        .dir-btn {
            width: 48px;
            height: 48px;
            border: 1.5px solid var(--border);
            background: var(--bg-input);
            border-radius: 12px;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-dim);
            backdrop-filter: blur(10px);
        }

        .dir-btn.active {
            border-color: var(--border-focus);
            background: rgba(79, 106, 240, 0.1);
            color: var(--accent);
            box-shadow: 0 0 8px var(--accent-glow);
        }

        .dir-btn:active { transform: scale(0.92); }

        .days-field {
            flex: 1;
            padding: 14px 12px;
            font-size: 22px;
            font-weight: 700;
            font-family: 'SF Mono', 'Fira Code', monospace;
            letter-spacing: 1px;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            outline: none;
            transition: all 0.25s;
            background: var(--bg-input);
            color: var(--text-primary);
            text-align: center;
            -moz-appearance: textfield;
            backdrop-filter: blur(10px);
        }

        .days-field::-webkit-outer-spin-button,
        .days-field::-webkit-inner-spin-button { -webkit-appearance: none; }

        .days-field::placeholder {
            color: var(--text-dim);
            font-size: 14px;
            letter-spacing: 0;
        }

        .days-field:focus {
            border-color: var(--border-focus);
            background: var(--bg-input-focus);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .days-unit {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-dim);
        }

        /* 分隔线 */
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border), rgba(79, 106, 240, 0.1), var(--border), transparent);
            margin: 8px 0 20px;
        }

        /* 结果区域 */
        .result {
            border-radius: 16px;
            padding: 24px 20px;
            text-align: center;
            margin-top: auto;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            background: linear-gradient(135deg, rgba(79, 106, 240, 0.05) 0%, rgba(155, 111, 232, 0.03) 100%);
            border: 1px solid rgba(79, 106, 240, 0.1);
            position: relative;
            overflow: hidden;
        }

        .result::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: var(--accent-gradient-bright);
            opacity: 0.4;
        }

        .result.has-value {
            background: linear-gradient(135deg, rgba(79, 106, 240, 0.08) 0%, rgba(155, 111, 232, 0.05) 100%);
            border-color: rgba(79, 106, 240, 0.15);
            box-shadow: 0 4px 20px rgba(79, 106, 240, 0.08);
        }

        .result.has-value::before { opacity: 0.7; }

        .result-label {
            font-size: 10px;
            font-weight: 700;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .result-main {
            font-size: 48px;
            font-weight: 800;
            background: var(--accent-gradient-bright);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -2px;
            line-height: 1.1;
            transition: all 0.3s;
        }

        .result-main.date-result {
            font-size: 28px;
            letter-spacing: -0.5px;
        }

        .result-main.placeholder {
            font-size: 32px;
            background: linear-gradient(135deg, rgba(100, 110, 135, 0.35), rgba(100, 110, 135, 0.2));
            -webkit-background-clip: text;
            background-clip: text;
        }

        .result-sub {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 8px;
            font-weight: 500;
        }

        /* 详细信息条 */
        .result-stats {
            display: flex;
            gap: 0;
            margin-top: 16px;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(79, 106, 240, 0.08);
        }

        .stat-item {
            flex: 1;
            padding: 10px 6px;
            text-align: center;
            background: rgba(79, 106, 240, 0.04);
            border-right: 1px solid rgba(79, 106, 240, 0.06);
        }

        .stat-item:last-child { border-right: none; }

        .stat-label {
            font-size: 9px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 3px;
        }

        .stat-value {
            font-size: 15px;
            font-weight: 700;
            font-family: 'SF Mono', 'Fira Code', monospace;
            color: var(--accent-bright);
        }

        /* 快捷操作 */
        .quick-actions {
            display: flex;
            gap: 6px;
            margin-top: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .quick-btn {
            padding: 6px 12px;
            border: 1px solid rgba(79, 106, 240, 0.12);
            background: rgba(79, 106, 240, 0.04);
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(10px);
        }

        .quick-btn:active {
            transform: scale(0.93);
            background: rgba(79, 106, 240, 0.12);
            color: var(--accent);
        }

        /* 模式内容 */
        .mode-content {
            display: none;
            flex-direction: column;
            flex: 1;
            animation: fadeSlide 0.35s ease;
        }

        .mode-content.active { display: flex; }

        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 4px 20px rgba(79, 106, 240, 0.06); }
            50% { box-shadow: 0 4px 28px rgba(79, 106, 240, 0.12); }
        }

        .result.has-value {
            animation: pulseGlow 3s ease-in-out infinite;
        }

        .hidden { display: none !important; }

        /* 底部 */
        .footer {
            text-align: center;
            padding: 16px 0 8px;
            font-size: 11px;
            color: var(--text-dim);
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        /* 提示 toast */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(60px);
            background: rgba(16, 185, 129, 0.92);
            color: white;
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            opacity: 0;
            transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 100;
            box-shadow: 0 4px 16px var(--success-glow);
            backdrop-filter: blur(10px);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* 小屏 */
        @media (max-width: 380px) {
            .page { padding: 12px; }
            .card { padding: 20px 14px; }
            .result-main { font-size: 40px; }
            .result-main.date-result { font-size: 24px; }
            .date-field { padding: 10px 2px; font-size: 15px; }
            .date-group { gap: 3px; }
            .date-row { gap: 6px; }
            .today-btn { padding: 10px 8px; font-size: 10px; }
            .stat-value { font-size: 13px; }
        }
    </style>
</head>
<body>
    <div class="page">
        <!-- 导航 -->
        <div class="nav">
            <a href="index.html" class="back-link">< 返回</a>
            <span class="nav-title">天数计算器</span>
            <span class="nav-spacer"></span>
        </div>

        <!-- 模式切换 -->
        <div class="mode-switch">
            <div class="mode-slider" id="modeSlider"></div>
            <button class="mode-tab active" onclick="switchMode('interval', this)">间隔天数</button>
            <button class="mode-tab" onclick="switchMode('calc', this)">日期推算</button>
        </div>

        <!-- 主卡片 -->
        <div class="card">
            <!-- 间隔天数模式 -->
            <div class="mode-content active" id="intervalContent">
                <div class="field">
                    <div class="field-label"><span class="dot"></span>开始日期</div>
                    <div class="date-row">
                        <div class="date-group">
                            <input type="number" class="date-field year" id="sYear" placeholder="年" maxlength="4" inputmode="numeric" oninput="limitYear(this); autoJump(this,'sMonth')" onchange="calcInterval()">
                            <span class="date-sep">/</span>
                            <input type="number" class="date-field" id="sMonth" placeholder="月" inputmode="numeric" oninput="limitMonth(this); autoJump(this,'sDay')" onchange="calcInterval()">
                            <span class="date-sep">/</span>
                            <input type="number" class="date-field" id="sDay" placeholder="日" inputmode="numeric" oninput="limitDay(this,'sYear','sMonth'); calcInterval()" onchange="calcInterval()">
                        </div>
                        <button class="today-btn" onclick="fillToday('sYear','sMonth','sDay'); calcInterval()">今天</button>
                    </div>
                </div>

                <div class="field">
                    <div class="field-label"><span class="dot"></span>结束日期</div>
                    <div class="date-row">
                        <div class="date-group">
                            <input type="number" class="date-field year" id="eYear" placeholder="年" maxlength="4" inputmode="numeric" oninput="limitYear(this); autoJump(this,'eMonth')" onchange="calcInterval()">
                            <span class="date-sep">/</span>
                            <input type="number" class="date-field" id="eMonth" placeholder="月" inputmode="numeric" oninput="limitMonth(this); autoJump(this,'eDay')" onchange="calcInterval()">
                            <span class="date-sep">/</span>
                            <input type="number" class="date-field" id="eDay" placeholder="日" inputmode="numeric" oninput="limitDay(this,'eYear','eMonth'); calcInterval()" onchange="calcInterval()">
                        </div>
                        <button class="today-btn" onclick="fillToday('eYear','eMonth','eDay'); calcInterval()">今天</button>
                    </div>
                </div>

                <div class="divider"></div>

                <div class="result" id="intervalResult">
                    <div class="result-label">间隔天数</div>
                    <div class="result-main placeholder" id="intervalValue">--</div>
                    <div class="result-sub" id="intervalSub">输入开始和结束日期</div>
                    <div class="result-stats hidden" id="intervalStats">
                        <div class="stat-item">
                            <div class="stat-label">天</div>
                            <div class="stat-value" id="statDays">-</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">周</div>
                            <div class="stat-value" id="statWeeks">-</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">月</div>
                            <div class="stat-value" id="statMonths">-</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">年</div>
                            <div class="stat-value" id="statYears">-</div>
                        </div>
                    </div>
                </div>

                <!-- 快捷填充 -->
                <div class="quick-actions">
                    <button class="quick-btn" onclick="quickInterval(7)">7天后</button>
                    <button class="quick-btn" onclick="quickInterval(15)">15天后</button>
                    <button class="quick-btn" onclick="quickInterval(30)">30天后</button>
                    <button class="quick-btn" onclick="quickInterval(60)">60天后</button>
                    <button class="quick-btn" onclick="quickInterval(90)">90天后</button>
                    <button class="quick-btn" onclick="quickInterval(365)">1年后</button>
                </div>
            </div>

            <!-- 日期推算模式 -->
            <div class="mode-content" id="calcContent">
                <div class="field">
                    <div class="field-label"><span class="dot"></span>起始日期</div>
                    <div class="date-row">
                        <div class="date-group">
                            <input type="number" class="date-field year" id="cYear" placeholder="年" maxlength="4" inputmode="numeric" oninput="limitYear(this); autoJump(this,'cMonth')" onchange="calcDate()">
                            <span class="date-sep">/</span>
                            <input type="number" class="date-field" id="cMonth" placeholder="月" inputmode="numeric" oninput="limitMonth(this); autoJump(this,'cDay')" onchange="calcDate()">
                            <span class="date-sep">/</span>
                            <input type="number" class="date-field" id="cDay" placeholder="日" inputmode="numeric" oninput="limitDay(this,'cYear','cMonth'); calcDate()" onchange="calcDate()">
                        </div>
                        <button class="today-btn" onclick="fillToday('cYear','cMonth','cDay'); calcDate()">今天</button>
                    </div>
                </div>

                <div class="field">
                    <div class="field-label"><span class="dot"></span>加减天数</div>
                    <div class="days-row">
                        <div class="dir-group">
                            <button class="dir-btn active" id="dirPlus" onclick="setDir(1)">+</button>
                            <button class="dir-btn" id="dirMinus" onclick="setDir(-1)">−</button>
                        </div>
                        <input type="number" class="days-field" id="calcDays" placeholder="0" min="0" max="99999" inputmode="numeric" oninput="calcDate()">
                        <span class="days-unit">天</span>
                    </div>
                </div>

                <div class="divider"></div>

                <div class="result" id="calcResult">
                    <div class="result-label">推算结果</div>
                    <div class="result-main date-result placeholder" id="calcValue">--</div>
                    <div class="result-sub" id="calcSub">输入日期和天数</div>
                </div>

                <!-- 常用天数快捷 -->
                <div class="quick-actions">
                    <button class="quick-btn" onclick="quickDays(3)">3天</button>
                    <button class="quick-btn" onclick="quickDays(7)">7天</button>
                    <button class="quick-btn" onclick="quickDays(15)">15天</button>
                    <button class="quick-btn" onclick="quickDays(30)">30天</button>
                    <button class="quick-btn" onclick="quickDays(60)">60天</button>
                    <button class="quick-btn" onclick="quickDays(90)">90天</button>
                    <button class="quick-btn" onclick="quickDays(180)">180天</button>
                    <button class="quick-btn" onclick="quickDays(365)">365天</button>
                </div>
            </div>
        </div>

        <div class="footer">江苏漫修（无锡）律师事务所 · 刘成律师</div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let direction = 1;

        // === 输入限制 ===
        function limitYear(el) {
            let v = el.value.replace(/\D/g, '');
            if (v.length > 4) v = v.slice(0, 4);
            el.value = v;
        }

        function limitMonth(el) {
            let v = el.value.replace(/\D/g, '');
            if (v.length > 2) v = v.slice(0, 2);
            const n = parseInt(v);
            if (n > 12) v = '12';
            el.value = v;
        }

        function limitDay(el, yearId, monthId) {
            let v = el.value.replace(/\D/g, '');
            if (v.length > 2) v = v.slice(0, 2);
            const n = parseInt(v);
            const y = parseInt(document.getElementById(yearId).value) || 2026;
            const m = parseInt(document.getElementById(monthId).value) || 1;
            const maxDay = new Date(y, m, 0).getDate();
            if (n > maxDay) v = String(maxDay);
            el.value = v;
        }

        // 自动跳转下一个输入框
        function autoJump(current, nextId) {
            const v = current.value;
            const isYear = current.classList.contains('year');
            if (isYear && v.length === 4) {
                document.getElementById(nextId).focus();
                document.getElementById(nextId).select();
            } else if (!isYear && v.length === 2) {
                document.getElementById(nextId).focus();
                document.getElementById(nextId).select();
            }
        }

        // 填充今天
        function fillToday(yId, mId, dId) {
            const t = new Date();
            document.getElementById(yId).value = t.getFullYear();
            document.getElementById(mId).value = t.getMonth() + 1;
            document.getElementById(dId).value = t.getDate();
            showToast('已填入今天日期');
        }

        // 构建日期
        function buildDate(yId, mId, dId) {
            const y = parseInt(document.getElementById(yId).value);
            const m = parseInt(document.getElementById(mId).value);
            const d = parseInt(document.getElementById(dId).value);
            if (!y || !m || !d) return null;
            if (y < 1 || m < 1 || m > 12 || d < 1 || d > 31) return null;
            const date = new Date(y, m - 1, d);
            // 验证日期有效性
            if (date.getFullYear() !== y || date.getMonth() !== m - 1 || date.getDate() !== d) return null;
            return date;
        }

        function formatDate(d) {
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const dd = String(d.getDate()).padStart(2, '0');
            return `${y}-${m}-${dd}`;
        }

        const WEEKDAYS = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];

        // === 模式切换 ===
        function switchMode(mode, btn) {
            document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');

            const slider = document.getElementById('modeSlider');
            slider.classList.toggle('right', mode === 'calc');

            document.querySelectorAll('.mode-content').forEach(c => c.classList.remove('active'));
            const target = mode === 'interval' ? 'intervalContent' : 'calcContent';
            document.getElementById(target).classList.add('active');
        }

        // === 间隔计算 ===
        function calcInterval() {
            const start = buildDate('sYear', 'sMonth', 'sDay');
            const end = buildDate('eYear', 'eMonth', 'eDay');
            const mainEl = document.getElementById('intervalValue');
            const subEl = document.getElementById('intervalSub');
            const statsEl = document.getElementById('intervalStats');
            const resultEl = document.getElementById('intervalResult');

            if (!start || !end) {
                mainEl.textContent = '--';
                mainEl.classList.add('placeholder');
                mainEl.classList.remove('placeholder');
                subEl.textContent = '输入开始和结束日期';
                statsEl.classList.add('hidden');
                resultEl.classList.remove('has-value');
                return;
            }

            const diffMs = end - start;
            const days = Math.round(Math.abs(diffMs) / (1000 * 60 * 60 * 24));
            const neg = diffMs < 0;

            mainEl.textContent = days + ' 天';
            mainEl.classList.remove('placeholder');
            resultEl.classList.add('has-value');

            const arrow = neg ? ' ← ' : ' → ';
            const note = neg ? '（结束早于开始）' : '';
            subEl.textContent = formatDate(start) + arrow + formatDate(end) + note;

            // 统计详情
            statsEl.classList.remove('hidden');
            document.getElementById('statDays').textContent = days;
            const w = Math.floor(days / 7);
            const wd = days % 7;
            document.getElementById('statWeeks').textContent = w + (wd > 0 ? '+' + wd + 'd' : '');
            const mDiff = Math.abs((end.getFullYear() - start.getFullYear()) * 12 + end.getMonth() - start.getMonth());
            document.getElementById('statMonths').textContent = mDiff;
            document.getElementById('statYears').textContent = (days / 365.25).toFixed(1);
        }

        // 快捷间隔：设置开始为今天，结束为 N 天后
        function quickInterval(n) {
            const t = new Date();
            document.getElementById('sYear').value = t.getFullYear();
            document.getElementById('sMonth').value = t.getMonth() + 1;
            document.getElementById('sDay').value = t.getDate();

            const future = new Date(t);
            future.setDate(future.getDate() + n);
            document.getElementById('eYear').value = future.getFullYear();
            document.getElementById('eMonth').value = future.getMonth() + 1;
            document.getElementById('eDay').value = future.getDate();

            calcInterval();
            showToast(`今天 → ${n}天后`);
        }

        // === 方向 ===
        function setDir(d) {
            direction = d;
            document.getElementById('dirPlus').classList.toggle('active', d === 1);
            document.getElementById('dirMinus').classList.toggle('active', d === -1);
            calcDate();
        }

        // === 日期推算 ===
        function calcDate() {
            const start = buildDate('cYear', 'cMonth', 'cDay');
            const days = parseInt(document.getElementById('calcDays').value) || 0;
            const mainEl = document.getElementById('calcValue');
            const subEl = document.getElementById('calcSub');
            const resultEl = document.getElementById('calcResult');

            if (!start) {
                mainEl.textContent = '--';
                mainEl.classList.add('placeholder');
                subEl.textContent = '输入日期和天数';
                resultEl.classList.remove('has-value');
                return;
            }

            mainEl.classList.remove('placeholder');
            resultEl.classList.add('has-value');

            if (days === 0) {
                mainEl.textContent = formatDate(start) + ' ' + WEEKDAYS[start.getDay()];
                subEl.textContent = '输入天数进行推算';
                return;
            }

            const result = new Date(start);
            result.setDate(result.getDate() + days * direction);

            mainEl.textContent = formatDate(result) + ' ' + WEEKDAYS[result.getDay()];
            const sign = direction > 0 ? '+' : '-';
            subEl.textContent = `${formatDate(start)} ${sign} ${days} 天`;
        }

        // 快捷天数
        function quickDays(n) {
            if (!buildDate('cYear', 'cMonth', 'cDay')) {
                fillToday('cYear', 'cMonth', 'cDay');
            }
            document.getElementById('calcDays').value = n;
            calcDate();
        }

        // === Toast ===
        function showToast(msg) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 1500);
        }
    </script>
</body>
</html>
