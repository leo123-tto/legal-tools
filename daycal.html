<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>天数计算器 - 法律工具集</title>
    <style>
        :root {
            /* Claude Design System - Warm Palette */
            --bg-parchment: #f5f4ed;
            --bg-ivory: #faf9f5;
            --bg-white: #ffffff;
            --bg-sand: #e8e6dc;
            --text-near-black: #141413;
            --text-olive-gray: #5e5d59;
            --text-stone-gray: #87867f;
            --text-dark-warm: #3d3d3a;
            --border-cream: #f0eee6;
            --border-warm: #e8e6dc;
            --brand-terracotta: #c96442;
            --brand-coral: #d97757;
            --accent-focus: #3898ec;
            --shadow-whisper: rgba(0,0,0,0.05) 0px 4px 24px;
            --shadow-ring: 0px 0px 0px 1px;
            --radius-sm: 8px;
            --radius-md: 10px;
            --radius-lg: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            min-height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
            background: var(--bg-parchment);
            color: var(--text-near-black);
            font-size: 16px;
            line-height: 1.60;
        }

        body { min-height: 100vh; padding-bottom: 40px; }

        /* Header */
        .header {
            padding: 18px 20px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            color: var(--brand-terracotta);
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            padding: 6px 10px 6px 4px;
            border-radius: var(--radius-sm);
            transition: background .15s;
        }
        .back-link:active { background: rgba(201,100,66,.08); }
        .back-link svg { flex-shrink: 0; }

        .page-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-near-black);
            letter-spacing: .02em;
        }

        .main {
            padding: 18px 16px 0;
            max-width: 520px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        /* Card */
        .card {
            background: var(--bg-ivory);
            border: 1px solid var(--border-cream);
            border-radius: var(--radius-sm);
            padding: 18px 18px;
            box-shadow: var(--shadow-whisper);
        }

        /* Segment Switch */
        .segment-wrap {
            display: flex;
            background: var(--bg-sand);
            border-radius: var(--radius-md);
            padding: 3px;
            gap: 3px;
        }

        .seg-btn {
            flex: 1;
            padding: 10px 0;
            border: none;
            background: transparent;
            border-radius: var(--radius-sm);
            font-size: 15px;
            font-weight: 600;
            color: var(--text-olive-gray);
            cursor: pointer;
            transition: background .18s, color .18s, box-shadow .18s;
        }

        .seg-btn.active {
            background: var(--bg-white);
            color: var(--brand-terracotta);
            box-shadow: var(--shadow-ring) var(--border-warm);
        }

        /* Section Label */
        .section-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-olive-gray);
            text-transform: uppercase;
            letter-spacing: .06em;
            margin-bottom: 8px;
        }

        /* Field Row */
        .field-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .field-row:last-child { margin-bottom: 0; }

        .field-label {
            font-size: 13px;
            color: var(--text-stone-gray);
            white-space: nowrap;
            min-width: 56px;
        }

        .field-input {
            flex: 1;
            min-width: 0;
        }

        /* Date Input */
        .date-input {
            width: 100%;
            height: 48px;
            border: 1px solid var(--border-cream);
            border-radius: var(--radius-lg);
            padding: 0 14px;
            font-size: 16px;
            color: var(--text-near-black);
            background: var(--bg-white);
            outline: none;
            -webkit-appearance: none;
            appearance: none;
            transition: border-color .2s, box-shadow .2s;
        }

        .date-input:focus {
            border-color: var(--accent-focus);
            box-shadow: 0 0 0 3px rgba(56, 152, 236, 0.12);
        }

        /* Today Button */
        .btn {
            height: 48px;
            border: none;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all .2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            white-space: nowrap;
        }

        .btn-today {
            background: var(--bg-sand);
            color: var(--text-olive-gray);
            padding: 0 14px;
        }
        .btn-today:active { background: var(--border-warm); }

        /* Direction Buttons */
        .dir-group {
            display: flex;
            gap: 4px;
        }

        .dir-btn {
            width: 48px;
            height: 48px;
            border: 1px solid var(--border-cream);
            background: var(--bg-white);
            border-radius: var(--radius-md);
            font-size: 20px;
            font-weight: 600;
            color: var(--text-stone-gray);
            cursor: pointer;
            transition: all .2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .dir-btn.active {
            border-color: var(--brand-terracotta);
            background: rgba(201, 100, 66, 0.08);
            color: var(--brand-terracotta);
        }
        .dir-btn:active { transform: scale(0.95); }

        /* Days Input */
        .days-input {
            flex: 1;
            height: 48px;
            border: 1px solid var(--border-cream);
            border-radius: var(--radius-lg);
            padding: 0 14px;
            font-size: 20px;
            font-weight: 700;
            color: var(--text-near-black);
            background: var(--bg-white);
            outline: none;
            text-align: center;
            -webkit-appearance: none;
            appearance: none;
        }

        .days-input:focus {
            border-color: var(--accent-focus);
            box-shadow: 0 0 0 3px rgba(56, 152, 236, 0.12);
        }

        .days-unit {
            font-size: 14px;
            color: var(--text-stone-gray);
            font-weight: 600;
        }

        /* Quick Buttons */
        .quick-actions {
            display: flex;
            gap: 4px;
            margin-top: 14px;
            justify-content: space-between;
        }

        .quick-btn {
            flex: 1;
            padding: 8px 4px;
            text-align: center;
            border: 1px solid var(--border-cream);
            background: var(--bg-white);
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-olive-gray);
            cursor: pointer;
            transition: all .2s;
        }
        .quick-btn:active {
            background: var(--bg-sand);
            color: var(--brand-terracotta);
        }

        /* Divider */
        .divider {
            height: 1px;
            background: var(--border-cream);
            margin: 16px 0;
        }

        /* Result Card */
        .result-card {
            background: linear-gradient(135deg, #c96442 0%, #d97757 100%);
            border-radius: var(--radius-md);
            box-shadow: rgba(201, 100, 66, 0.25) 0px 4px 24px;
            padding: 20px;
            color: #fff;
            display: none;
        }

        .result-card.visible { display: block; }

        .result-title {
            font-size: 12px;
            font-weight: 600;
            opacity: .8;
            letter-spacing: .05em;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .result-main {
            font-size: 42px;
            font-weight: 800;
            letter-spacing: -1px;
            line-height: 1.1;
            margin-bottom: 2px;
        }

        .result-sub {
            font-size: 13px;
            opacity: .8;
            margin-bottom: 14px;
        }

        .result-breakdown {
            background: rgba(255,255,255,.15);
            border-radius: var(--radius-sm);
            padding: 12px 14px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        .result-row .label { opacity: .9; }
        .result-row .value { font-weight: 700; }

        /* Placeholder */
        .placeholder-card {
            background: var(--bg-ivory);
            border: 1px solid var(--border-cream);
            border-radius: var(--radius-sm);
            padding: 28px 20px;
            text-align: center;
            color: var(--text-stone-gray);
            font-size: 14px;
        }

        .placeholder-icon {
            font-size: 36px;
            margin-bottom: 10px;
            display: block;
        }

        /* Mode Content */
        .mode-content { display: none; }
        .mode-content.active { display: block; }

        /* Footer */
        .footer {
            text-align: center;
            color: var(--text-stone-gray);
            font-size: 12px;
            padding: 24px 20px 0;
            max-width: 520px;
            margin: 0 auto;
            line-height: 1.6;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(60px);
            background: rgba(201, 100, 66, 0.92);
            color: #fff;
            padding: 10px 20px;
            border-radius: var(--radius-md);
            font-size: 13px;
            font-weight: 600;
            opacity: 0;
            transition: all .35s cubic-bezier(.16,1,.3,1);
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        /* Responsive */
        @media (min-width: 520px) {
            .header { padding: 24px 24px 0; max-width: 520px; margin: 0 auto; }
            .main { padding: 20px 24px 0; }
        }

        @media (max-width: 380px) {
            .field-label { min-width: 48px; font-size: 12px; }
            .result-main { font-size: 36px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html" class="back-link" aria-label="返回">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"/>
            </svg>
            返回
        </a>
        <h1 class="page-title">天数计算器</h1>
    </div>

    <div class="main">
        <!-- 模式切换 -->
        <div class="card" style="padding: 12px 14px;">
            <div class="segment-wrap">
                <button class="seg-btn active" id="seg-interval" onclick="switchMode('interval', this)">间隔天数</button>
                <button class="seg-btn" id="seg-calc" onclick="switchMode('calc', this)">日期推算</button>
            </div>
        </div>

        <!-- 间隔天数模式 -->
        <div class="mode-content active" id="intervalContent">
            <div class="card">
                <div class="section-label">开始日期</div>
                <div class="field-row">
                    <div class="field-input">
                        <input type="date" class="date-input" id="sDate" onchange="calcInterval()">
                    </div>
                    <button class="btn btn-today" onclick="fillToday('sDate'); calcInterval()">今天</button>
                </div>
            </div>

            <div class="card">
                <div class="section-label">结束日期</div>
                <div class="field-row">
                    <div class="field-input">
                        <input type="date" class="date-input" id="eDate" onchange="calcInterval()">
                    </div>
                    <button class="btn btn-today" onclick="fillToday('eDate'); calcInterval()">今天</button>
                </div>
            </div>

            <div class="placeholder-card" id="intervalPlaceholder">
                <span class="placeholder-icon">📅</span>
                <div>选择开始和结束日期</div>
            </div>

            <div class="result-card" id="intervalResult">
                <div class="result-title">间隔天数</div>
                <div class="result-main" id="intervalValue">—</div>
                <div class="result-sub" id="intervalSub"></div>
                <div class="result-breakdown" id="intervalBreakdown"></div>
            </div>

            <div class="quick-actions">
                <button class="quick-btn" onclick="quickInterval(7)">7天后</button>
                <button class="quick-btn" onclick="quickInterval(15)">15天后</button>
                <button class="quick-btn" onclick="quickInterval(30)">30天后</button>
                <button class="quick-btn" onclick="quickInterval(60)">60天后</button>
                <button class="quick-btn" onclick="quickInterval(90)">90天后</button>
                <button class="quick-btn" onclick="quickInterval(365)">1年后</button>
            </div>
        </div>

        <!-- 日期推算模式 -->
        <div class="mode-content" id="calcContent">
            <div class="card">
                <div class="section-label">起始日期</div>
                <div class="field-row">
                    <div class="field-input">
                        <input type="date" class="date-input" id="cDate" onchange="calcDate()">
                    </div>
                    <button class="btn btn-today" onclick="fillToday('cDate'); calcDate()">今天</button>
                </div>
            </div>

            <div class="card">
                <div class="section-label">加减天数</div>
                <div class="field-row">
                    <div class="dir-group">
                        <button class="dir-btn active" id="dirPlus" onclick="setDir(1)">+</button>
                        <button class="dir-btn" id="dirMinus" onclick="setDir(-1)">−</button>
                    </div>
                    <input type="number" class="days-input" id="calcDays" placeholder="0" min="0" oninput="calcDate()">
                    <span class="days-unit">天</span>
                </div>
            </div>

            <div class="placeholder-card" id="calcPlaceholder">
                <span class="placeholder-icon">📆</span>
                <div>输入日期和天数</div>
            </div>

            <div class="result-card" id="calcResult">
                <div class="result-title">推算结果</div>
                <div class="result-main" id="calcValue">—</div>
                <div class="result-sub" id="calcSub"></div>
            </div>

            <div class="quick-actions">
                <button class="quick-btn" onclick="quickDays(3)">3天</button>
                <button class="quick-btn" onclick="quickDays(7)">7天</button>
                <button class="quick-btn" onclick="quickDays(15)">15天</button>
                <button class="quick-btn" onclick="quickDays(30)">30天</button>
                <button class="quick-btn" onclick="quickDays(90)">90天</button>
                <button class="quick-btn" onclick="quickDays(180)">180天</button>
                <button class="quick-btn" onclick="quickDays(365)">365天</button>
            </div>
        </div>
    </div>

    <div class="footer">
        江苏漫修（无锡）律师事务所 · 刘成律师
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let direction = 1;

        // 填充今天
        function fillToday(inputId) {
            const t = new Date();
            const y = t.getFullYear();
            const m = String(t.getMonth() + 1).padStart(2, '0');
            const d = String(t.getDate()).padStart(2, '0');
            document.getElementById(inputId).value = `${y}-${m}-${d}`;
            showToast('已填入今天日期');
        }

        // 格式化日期
        function formatDateDisplay(dateStr) {
            if (!dateStr) return '';
            const [y, m, d] = dateStr.split('-');
            return `${y}年${m}月${d}日`;
        }

        // 计算星期
        function getWeekday(dateStr) {
            if (!dateStr) return '';
            const [y, m, d] = dateStr.split('-').map(Number);
            const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            return weekdays[new Date(y, m - 1, d).getDay()];
        }

        // 模式切换
        function switchMode(mode, btn) {
            document.getElementById('seg-interval').classList.toggle('active', mode === 'interval');
            document.getElementById('seg-calc').classList.toggle('active', mode === 'calc');
            document.getElementById('intervalContent').classList.toggle('active', mode === 'interval');
            document.getElementById('calcContent').classList.toggle('active', mode === 'calc');
        }

        // === 间隔计算 ===
        function calcInterval() {
            const start = document.getElementById('sDate').value;
            const end = document.getElementById('eDate').value;
            const phEl = document.getElementById('intervalPlaceholder');
            const resultEl = document.getElementById('intervalResult');
            const valueEl = document.getElementById('intervalValue');
            const subEl = document.getElementById('intervalSub');
            const breakdownEl = document.getElementById('intervalBreakdown');

            if (!start || !end) {
                phEl.style.display = '';
                resultEl.classList.remove('visible');
                return;
            }

            const startDate = new Date(start);
            const endDate = new Date(end);
            const diffMs = endDate - startDate;
            const days = Math.round(Math.abs(diffMs) / (1000 * 60 * 60 * 24));
            const neg = diffMs < 0;

            phEl.style.display = 'none';
            resultEl.classList.add('visible');

            const arrow = neg ? ' ← ' : ' → ';
            const note = neg ? '（结束早于开始）' : '';

            valueEl.textContent = days + ' 天';
            subEl.textContent = formatDateDisplay(start) + arrow + formatDateDisplay(end) + note;

            // 统计详情
            const w = Math.floor(days / 7);
            const wd = days % 7;
            const weeksStr = w + (wd > 0 ? '+' + wd + '天' : '');
            const mDiff = Math.abs((endDate.getFullYear() - startDate.getFullYear()) * 12 + endDate.getMonth() - startDate.getMonth());
            const yearsStr = (days / 365.25).toFixed(1);

            breakdownEl.innerHTML = `
                <div class="result-row"><span class="label">天</span><span class="value">${days}</span></div>
                <div class="result-row"><span class="label">周</span><span class="value">${weeksStr}</span></div>
                <div class="result-row"><span class="label">月</span><span class="value">${mDiff}</span></div>
                <div class="result-row"><span class="label">年</span><span class="value">${yearsStr}</span></div>
            `;
        }

        // 快捷间隔
        function quickInterval(n) {
            const t = new Date();
            const y = t.getFullYear();
            const m = String(t.getMonth() + 1).padStart(2, '0');
            const d = String(t.getDate()).padStart(2, '0');
            document.getElementById('sDate').value = `${y}-${m}-${d}`;

            const future = new Date(t);
            future.setDate(future.getDate() + n);
            const fy = future.getFullYear();
            const fm = String(future.getMonth() + 1).padStart(2, '0');
            const fd = String(future.getDate()).padStart(2, '0');
            document.getElementById('eDate').value = `${fy}-${fm}-${fd}`;

            calcInterval();
            showToast(`今天 → ${n}天后`);
        }

        // === 方向 ===
        function setDir(d) {
            direction = d;
            document.getElementById('dirPlus').classList.toggle('active', d === 1);
            document.getElementById('dirMinus').classList.toggle('active', d === -1);
            calcDate();
        }

        // === 日期推算 ===
        function calcDate() {
            const startStr = document.getElementById('cDate').value;
            const days = parseInt(document.getElementById('calcDays').value) || 0;
            const phEl = document.getElementById('calcPlaceholder');
            const resultEl = document.getElementById('calcResult');
            const valueEl = document.getElementById('calcValue');
            const subEl = document.getElementById('calcSub');

            if (!startStr) {
                phEl.style.display = '';
                resultEl.classList.remove('visible');
                return;
            }

            phEl.style.display = 'none';
            resultEl.classList.add('visible');

            if (days === 0) {
                valueEl.textContent = formatDateDisplay(startStr);
                subEl.textContent = getWeekday(startStr);
                return;
            }

            const [y, m, d] = startStr.split('-').map(Number);
            const result = new Date(y, m - 1, d);
            result.setDate(result.getDate() + days * direction);

            const ry = result.getFullYear();
            const rm = String(result.getMonth() + 1).padStart(2, '0');
            const rd = String(result.getDate()).padStart(2, '0');
            const resultStr = `${ry}-${rm}-${rd}`;

            valueEl.textContent = formatDateDisplay(resultStr);
            subEl.textContent = getWeekday(resultStr);
        }

        // 快捷天数
        function quickDays(n) {
            if (!document.getElementById('cDate').value) {
                fillToday('cDate');
            }
            document.getElementById('calcDays').value = n;
            calcDate();
        }

        // Toast
        function showToast(msg) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 1500);
        }
    </script>
</body>
</html>
