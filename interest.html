<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>利息/执行款计算器 - 法律工具集</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* 色彩 - Claude Design System */
      /* 页面背景 */
      --bg-parchment: #f5f4ed;
      /* 卡片背景 */
      --bg-ivory: #faf9f5;
      --bg-white: #ffffff;
      /* 品牌色 */
      --brand-terracotta: #c96442;
      --brand-coral: #d97757;
      /* 文字 */
      --text-near-black: #141413;
      --text-olive-gray: #5e5d59;
      --text-stone-gray: #87867f;
      --text-dark-warm: #3d3d3a;
      /* 边框 */
      --border-cream: #f0eee6;
      --border-warm: #e8e6dc;
      /* 其他 */
      --ring-warm: #d1cfc5;
      --ring-subtle: #dedc01;
      --focus-blue: #3898ec;
      --error-crimson: #b53333;
      /* 阴影 */
      --shadow-whisper: rgba(0,0,0,0.05) 0px 4px 24px;
    }

    html, body {
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
      background: var(--bg-parchment);
      color: var(--text-near-black);
      font-size: 16px;
      line-height: 1.60;
      -webkit-tap-highlight-color: transparent;
    }

    body { min-height: 100vh; padding-bottom: 40px; }

    .header {
      padding: 18px 20px 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: var(--brand-terracotta);
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
      padding: 6px 10px 6px 4px;
      border-radius: 8px;
      transition: background .15s;
    }
    .back-link:active { background: rgba(201,100,66,0.1); }
    .back-link svg { flex-shrink: 0; }

    .page-title {
      font-family: -apple-system, "Songti SC", "SimSun", Georgia, serif;
      font-size: 20px;
      font-weight: 500;
      color: var(--text-near-black);
      letter-spacing: .02em;
    }

    .main {
      padding: 18px 16px 0;
      max-width: 520px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
    }

    .main > * + * {
      margin-top: 18px;
    }

    .card {
      background: var(--bg-ivory);
      border: 1px solid var(--border-cream);
      border-radius: 8px;
      box-shadow: var(--shadow-whisper);
      padding: 18px 18px;
    }

    /* 功能切换 */
    .segment-wrap {
      display: flex;
      background: var(--border-warm);
      border-radius: 8px;
      padding: 3px;
      gap: 3px;
    }

    .seg-btn {
      flex: 1;
      padding: 10px 0;
      border: none;
      background: transparent;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 500;
      color: var(--text-olive-gray);
      cursor: pointer;
      transition: background .18s, color .18s, box-shadow .18s;
    }

    .seg-btn.active {
      background: var(--bg-white);
      color: var(--brand-terracotta);
      box-shadow: 0px 0px 0px 1px var(--ring-warm);
    }

    .section-label {
      font-family: -apple-system, "Songti SC", "SimSun", Georgia, serif;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-near-black);
      margin-bottom: 8px;
    }

    .input-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 2px;
    }

    .input-wrap {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
    }

    .amount-input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--border-cream);
      border-radius: 12px;
      padding: 0 60px 0 16px;
      font-size: 22px;
      font-weight: 500;
      color: var(--text-near-black);
      background: var(--bg-white);
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      -webkit-appearance: none;
      appearance: none;
    }
    .amount-input::-webkit-inner-spin-button,
    .amount-input::-webkit-outer-spin-button {
      -webkit-appearance: none;
    }
    .amount-input {
      -moz-appearance: textfield;
    }

    .amount-input:focus {
      border-color: var(--focus-blue);
      box-shadow: 0px 0px 0px 3px rgba(56,152,236,0.15);
    }

    .amount-input::placeholder { color: var(--text-stone-gray); font-weight: 400; font-size: 16px; }

    .input-unit {
      position: absolute;
      right: 14px;
      font-size: 13px;
      color: var(--text-stone-gray);
      font-weight: 500;
      pointer-events: none;
    }

    /* 按钮 */
    .btn {
      height: 44px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all .2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn-primary {
      background: var(--brand-terracotta);
      color: var(--bg-white);
      box-shadow: 0px 0px 0px 1px var(--brand-terracotta);
    }
    .btn-primary:active { transform: scale(.98); }

    .btn-secondary {
      background: var(--border-warm);
      color: var(--text-near-black);
    }
    .btn-secondary:active { background: var(--border-cream); }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--border-cream);
      color: var(--text-olive-gray);
    }
    .btn-outline:active { background: var(--border-warm); }

    /* 项目卡片 */
    .item-card {
      background: var(--bg-white);
      border: 1px solid var(--border-cream);
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 12px;
    }

    .item-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .item-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-near-black);
    }

    .item-delete {
      width: 26px;
      height: 26px;
      border: none;
      background: rgba(181, 51, 51, 0.08);
      color: var(--error-crimson);
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .item-delete:active { background: rgba(181, 51, 51, 0.15); }

    .inline-inputs {
      display: flex;
      gap: 8px;
    }

    .inline-inputs .input-wrap {
      flex: 1;
    }

    .inline-inputs .amount-input {
      height: 44px;
      font-size: 16px;
      padding: 0 40px 0 12px;
    }

    .inline-inputs .input-unit {
      right: 10px;
      font-size: 12px;
    }

    /* 日期输入 */
    .date-input {
      width: 100%;
      height: 44px;
      border: 1px solid var(--border-cream);
      border-radius: 12px;
      padding: 0 12px;
      font-size: 16px;
      color: var(--text-near-black);
      background: var(--bg-white);
      outline: none;
      -webkit-appearance: none;
      appearance: none;
    }
    .date-input::-webkit-inner-spin-button,
    .date-input::-webkit-outer-spin-button {
      -webkit-appearance: none;
    }
    .date-input {
      -moz-appearance: textfield;
    }
    .date-input:focus {
      border-color: var(--focus-blue);
      box-shadow: 0px 0px 0px 3px rgba(56,152,236,0.15);
    }

    /* 行内标签+输入 */
    .field-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .field-row:last-child { margin-bottom: 0; }

    .field-label {
      font-size: 13px;
      color: var(--text-olive-gray);
      white-space: nowrap;
      min-width: 50px;
    }

    .field-input {
      flex: 1;
      min-width: 0;
    }

    /* 结果卡片 */
    .result-card {
      background: var(--brand-terracotta);
      border-radius: 12px;
      box-shadow: var(--shadow-whisper);
      padding: 20px 20px 18px;
      color: var(--bg-white);
      display: none;
    }

    .result-card.visible { display: block; }

    .result-title {
      font-family: -apple-system, "Songti SC", "SimSun", Georgia, serif;
      font-size: 13px;
      font-weight: 500;
      opacity: .85;
      letter-spacing: .05em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .result-main {
      font-family: -apple-system, "Songti SC", "SimSun", Georgia, serif;
      font-size: 36px;
      font-weight: 500;
      letter-spacing: -.01em;
      line-height: 1.1;
      margin-bottom: 2px;
    }

    .result-sub {
      font-size: 13px;
      opacity: .8;
      margin-bottom: 14px;
    }

    .result-breakdown {
      background: rgba(255,255,255,.15);
      border-radius: 8px;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .result-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
    }

    .result-row .label { opacity: .9; }
    .result-row .value { font-weight: 500; }

    /* 计算过程 */
    .calc-detail {
      margin-top: 14px;
      background: rgba(255,255,255,.12);
      border-radius: 8px;
      padding: 12px 14px;
      display: none;
    }
    .calc-detail.visible { display: block; }
    .calc-detail-title {
      font-family: -apple-system, "Songti SC", "SimSun", Georgia, serif;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 8px;
      opacity: .9;
    }
    .calc-step {
      font-size: 12.5px;
      line-height: 1.6;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,.1);
    }
    .calc-step:last-child { border-bottom: none; }
    .calc-step .formula { font-family: monospace; font-size: 12px; opacity: .85; }
    .calc-toggle-btn {
      display: block;
      width: 100%;
      margin-top: 12px;
      padding: 10px;
      background: rgba(255,255,255,.15);
      border: none;
      border-radius: 8px;
      color: var(--bg-white);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
    }
    .calc-toggle-btn:active { background: rgba(255,255,255,.25); }

    /* 占位 */
    .placeholder-card {
      background: var(--bg-ivory);
      border: 1px solid var(--border-cream);
      border-radius: 8px;
      box-shadow: var(--shadow-whisper);
      padding: 28px 20px;
      text-align: center;
      color: var(--text-olive-gray);
      font-size: 14px;
    }

    .placeholder-icon {
      font-size: 36px;
      margin-bottom: 10px;
      display: block;
    }

    /* 法律依据链接 */
    .basis-link-wrap {
      text-align: center;
      padding: 4px 0 2px;
    }

    .basis-link {
      color: var(--brand-terracotta);
      font-size: 13px;
      text-decoration: none;
      border-bottom: 1px dashed var(--brand-coral);
      padding-bottom: 1px;
      cursor: pointer;
    }

    /* 底部 */
    .footer {
      text-align: center;
      color: var(--text-stone-gray);
      font-size: 12px;
      padding: 24px 20px 0;
      max-width: 520px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* 弹窗 */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .modal {
      background: var(--bg-ivory);
      border-radius: 12px 12px 0 0;
      width: 100%;
      max-width: 520px;
      max-height: 80vh;
      overflow-y: auto;
      padding: 0 0 env(safe-area-inset-bottom, 16px);
      transform: translateY(100%);
      transition: transform .3s cubic-bezier(.4,0,.2,1);
    }

    .modal-overlay.open .modal {
      transform: translateY(0);
    }

    .modal-header {
      position: sticky;
      top: 0;
      background: var(--bg-ivory);
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--border-cream);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-title {
      font-family: -apple-system, "Songti SC", "SimSun", Georgia, serif;
      font-size: 16px;
      font-weight: 500;
      color: var(--text-near-black);
    }

    .modal-close {
      width: 30px;
      height: 30px;
      border: none;
      background: var(--border-warm);
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-olive-gray);
      font-size: 16px;
    }

    .modal-body {
      padding: 16px 20px 20px;
      font-size: 13.5px;
      color: var(--text-near-black);
      line-height: 1.75;
    }

    .modal-body h3 {
      font-family: -apple-system, "Songti SC", "SimSun", Georgia, serif;
      font-size: 14px;
      font-weight: 500;
      color: var(--brand-terracotta);
      margin: 14px 0 6px;
    }

    .modal-body h3:first-child { margin-top: 0; }

    .modal-body p { margin-bottom: 6px; color: var(--text-dark-warm); }

    .law-table {
      width: 100%;
      border-collapse: collapse;
      margin: 8px 0;
      font-size: 12.5px;
    }

    .law-table th {
      background: var(--border-warm);
      color: var(--brand-terracotta);
      font-weight: 500;
      padding: 6px 8px;
      text-align: left;
    }

    .law-table td {
      padding: 6px 8px;
      border-bottom: 1px solid var(--border-cream);
    }

    .law-table tr:nth-child(even) td { background: rgba(232,230,220,0.5); }

    .hint {
      font-size: 12px;
      color: var(--text-stone-gray);
      margin-top: 6px;
      line-height: 1.5;
    }

    /* 小提示 */
    .tip {
      font-size: 11px;
      color: var(--text-stone-gray);
      margin-top: 4px;
      line-height: 1.4;
    }

    /* 切换开关 */
    .divider { height: 1px; background: var(--border-cream); margin: 12px 0; }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 0;
    }
    .toggle-label { font-size: 15px; color: var(--text-near-black); font-weight: 500; }
    .toggle-desc { font-size: 12px; color: var(--text-stone-gray); margin-top: 1px; }
    .ios-toggle { position: relative; width: 50px; height: 30px; flex-shrink: 0; }
    .ios-toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
    .ios-toggle-track { position: absolute; inset: 0; background: var(--border-warm); border-radius: 15px; cursor: pointer; transition: background .2s; }
    .ios-toggle input:checked + .ios-toggle-track { background: var(--brand-terracotta); }
    .ios-toggle-track::after {
      content: ''; position: absolute; top: 3px; left: 3px; width: 24px; height: 24px;
      background: var(--bg-white); border-radius: 50%; box-shadow: 0 1px 4px rgba(0,0,0,.18);
      transition: transform .2s;
    }
    .ios-toggle input:checked + .ios-toggle-track::after { transform: translateX(20px); }

    @media (min-width: 520px) {
      .header { padding: 24px 24px 0; max-width: 520px; margin: 0 auto; }
      .main { padding: 20px 24px 0; }
    }
  </style>
</head>
<body>

<div class="header">
  <a href="index.html" class="back-link" aria-label="返回">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
    返回
  </a>
  <h1 class="page-title">利息/执行款计算器</h1>
</div>

<div class="main">

  <!-- 功能切换 -->
  <div class="card">
    <div class="segment-wrap">
      <button class="seg-btn active" id="seg-interest" onclick="switchMode('interest')">利息计算</button>
      <button class="seg-btn" id="seg-execution" onclick="switchMode('execution')">执行款计算</button>
    </div>
  </div>

  <!-- 利息计算模式 -->
  <div id="panel-interest">
    <!-- 本金列表 -->
    <div class="card">
      <div class="section-label">本金明细</div>
      <div id="interest-principals"></div>
      <button class="btn btn-outline" style="width:100%; margin-top:18px;" onclick="addInterestPrincipal()">+ 添加本金</button>
    </div>

    <!-- 结果占位 - 在计算按钮之前显示 -->
    <div class="placeholder-card" id="interest-placeholder">
      <span class="placeholder-icon">💰</span>
      <div>添加本金后点击计算按钮</div>
    </div>

    <!-- 计算按钮 -->
    <button class="btn btn-primary" style="width:100%;" onclick="calculateInterest()">计算利息</button>

    <!-- 结果 -->
    <div class="result-card" id="interest-result">
      <div class="result-title">计算结果</div>
      <div class="result-main" id="interest-total">—</div>
      <div class="result-sub">总利息</div>
      <div class="result-breakdown" id="interest-breakdown"></div>
      <button class="calc-toggle-btn" onclick="toggleCalcDetail('interest')">查看计算过程</button>
      <div class="calc-detail" id="interest-calc-detail"></div>
    </div>

    <div class="basis-link-wrap">
      <a class="basis-link" onclick="openModal('interest')">查看利息计算法律依据</a>
    </div>
  </div>

  <!-- 执行款计算模式 -->
  <div id="panel-execution" style="display:none;">
    <!-- 多案切换 -->
    <div class="card" style="padding:12px;">
      <div class="toggle-row">
        <div>
          <div class="toggle-label">多案合并计算</div>
          <div class="toggle-desc">多个案件合并计算还款抵扣</div>
        </div>
        <label class="ios-toggle">
          <input type="checkbox" id="multi-case" onchange="toggleMultiCase()" />
          <div class="ios-toggle-track"></div>
        </label>
      </div>
    </div>

    <!-- 案件列表 -->
    <div class="card">
      <div class="section-label">案件明细</div>
      <div id="case-list"></div>
      <button class="btn btn-outline" style="width:100%; margin-top:18px;" onclick="addCase()">+ 添加案件</button>
    </div>

    <!-- 还款记录 -->
    <div class="card" style="margin-top:18px;">
      <div class="section-label">还款记录</div>
      <div id="repayment-list"></div>
      <button class="btn btn-outline" style="width:100%; margin-top:18px;" onclick="addRepayment()">+ 添加还款</button>
    </div>

    <!-- 迟延履行选项 -->
    <div class="card" style="padding:12px; margin-top:18px;">
      <div class="toggle-row">
        <div>
          <div class="toggle-label">计算迟延履行利息</div>
          <div class="toggle-desc">根据民事诉讼法第260条</div>
        </div>
        <label class="ios-toggle">
          <input type="checkbox" id="delayed-interest" onchange="calculateExecution()" />
          <div class="ios-toggle-track"></div>
        </label>
      </div>
    </div>

    <!-- 计算按钮 -->
    <button class="btn btn-primary" style="width:100%; margin-top:18px;" onclick="calculateExecution()">计算执行款</button>

    <!-- 结果 -->
    <div class="placeholder-card" id="execution-placeholder">
      <span class="placeholder-icon">📋</span>
      <div>添加案件后点击计算按钮</div>
    </div>

    <div class="result-card" id="execution-result">
      <div class="result-title">计算结果</div>
      <div class="result-main" id="execution-total">—</div>
      <div class="result-sub">待执行款合计</div>
      <div class="result-breakdown" id="execution-breakdown"></div>
      <button class="calc-toggle-btn" onclick="toggleCalcDetail('execution')">查看计算过程</button>
      <div class="calc-detail" id="execution-calc-detail"></div>
    </div>

    <div class="basis-link-wrap">
      <a class="basis-link" onclick="openModal('execution')">查看执行款计算法律依据</a>
    </div>
  </div>

</div>

<div class="footer">
  <div>江苏漫修（无锡）律师事务所 刘成律师</div>
</div>

<!-- 弹窗 -->
<div class="modal-overlay" id="modal-overlay" onclick="onOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">法律依据</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-content"></div>
  </div>
</div>

<script>
  // ===== LPR 历史数据 =====
  // 格式: { date: 'YYYY-MM-DD', lpr1y: x.xx, lpr5y: x.xx }
  const LPR_DATA = [
    { date: '2019-08-20', lpr1y: 4.25, lpr5y: 4.85 },
    { date: '2019-09-20', lpr1y: 4.20, lpr5y: 4.85 },
    { date: '2019-10-21', lpr1y: 4.20, lpr5y: 4.85 },
    { date: '2019-11-20', lpr1y: 4.15, lpr5y: 4.80 },
    { date: '2019-12-20', lpr1y: 4.15, lpr5y: 4.80 },

  // 获取指定日期对应的LPR利率
  function getLPRForDate(dateStr, term) {
    if (!dateStr) return null;
    const targetDate = new Date(dateStr);
    let lpr = null;
    for (const item of LPR_DATA) {
      const lprDate = new Date(item.date);
      if (lprDate <= targetDate) {
        lpr = term === '5y+' ? item.lpr5y : item.lpr1y;
      } else {
        break;
      }
    }
    return lpr;
  }

  // 计算两个日期之间的天数
  function daysBetween(startDate, endDate) {
    if (!startDate || !endDate) return 0;
    const start = new Date(startDate);
    const end = new Date(endDate);
    const diffTime = end - start;
    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
    return diffDays > 0 ? diffDays : 0;
  }

  // 计算单笔利息（按时间段分段，使用分段期间对应的LPR）
  function calculateInterestByPeriod(principal, startDate, endDate, rateType, customRate, lprTerm) {
    if (!principal || !startDate || !endDate) return 0;
    const principalNum = parseFloat(principal);
    if (isNaN(principalNum) || principalNum <= 0) return 0;

    const start = new Date(startDate);
    const end = new Date(endDate);
    if (end <= start) return 0;

    // 自定义利率直接计算
    if (rateType === 'custom') {
      const rate = parseFloat(customRate);
      if (!rate || isNaN(rate)) return 0;
      const days = daysBetween(startDate, endDate);
      const interest = principalNum * rate / 100 / 365 * days;
      return Math.round(interest * 100) / 100;
    }

    // LPR利率：按LPR变化点分段计算
    let totalInterest = 0;
    let currentDate = new Date(start);

    // 找到起始日期对应的LPR
    let currentRate = getLPRForDate(startDate, lprTerm);
    if (!currentRate) currentRate = 3.65; // 默认值

    // 遍历所有LPR变化点
    for (let i = 0; i < LPR_DATA.length; i++) {
      const lprDate = new Date(LPR_DATA[i].date);

      // 如果LPR日期在起始日期之前，继续
      if (lprDate <= start) continue;

      // 如果LPR日期在结束日期之后，退出循环
      if (lprDate > end) break;

      // 计算这一段的利息
      const segmentStart = currentDate.toISOString().split('T')[0];
      const segmentEnd = lprDate.toISOString().split('T')[0];
      const segmentDays = daysBetween(segmentStart, segmentEnd);

      if (segmentDays > 0) {
        totalInterest += principalNum * currentRate / 100 / 365 * segmentDays;
      }

      // 更新当前日期和利率
      currentDate = lprDate;
      currentRate = lprTerm === '5y+' ? LPR_DATA[i].lpr5y : LPR_DATA[i].lpr1y;
    }

    // 计算最后一段（从最后一个LPR变化点到endDate）
    const lastSegmentDays = daysBetween(currentDate.toISOString().split('T')[0], endDate);
    if (lastSegmentDays > 0 && currentRate) {
      totalInterest += principalNum * currentRate / 100 / 365 * lastSegmentDays;
    }

    return Math.round(totalInterest * 100) / 100;
  }

  // 利息计算
  function calculateInterest() {
    // 验证输入
    if (interestPrincipals.length === 0) {
      document.getElementById('interest-placeholder').style.display = '';
      document.getElementById('interest-result').classList.remove('visible');
      return;
    }

    let totalInterest = 0;
    const breakdownHtml = [];

    interestPrincipals.forEach((p, idx) => {
      const principal = parseFloat(p.principal);
      if (!principal || principal <= 0) return;

      // 如果用LPR，需要获取各时间段的LPR
      const rate = p.rateType === 'lpr' ? getLPRForDate(p.startDate, p.lprTerm) : parseFloat(p.rate);
      const rateDisplay = p.rateType === 'lpr' ? (rate ? rate + '%(LPR)' : '—') : p.rate + '%';

      const interest = calculateInterestByPeriod(
        principal,
        p.startDate,
        p.endDate,
        p.rateType,
        p.rate,
        p.lprTerm
      );

      totalInterest += interest;
      breakdownHtml.push(`
        <div class="result-row">
          <span class="label">本金 ${formatMoney(principal)} · ${p.startDate} 至 ${p.endDate}</span>
          <span class="value">${formatMoney(interest)}</span>
        </div>
      `);
    });

    // 显示结果
    document.getElementById('interest-placeholder').style.display = 'none';
    document.getElementById('interest-result').classList.add('visible');
    document.getElementById('interest-total').textContent = formatMoney(totalInterest);
    document.getElementById('interest-breakdown').innerHTML = breakdownHtml.join('') || '<div class="result-row"><span class="label">无有效数据</span></div>';

    // 生成计算过程详情
    let detailHtml = '<div class="calc-detail-title">各本金利息计算过程</div>';
    interestPrincipals.forEach((p, idx) => {
      const principal = parseFloat(p.principal);
      if (!principal || principal <= 0) return;

      const days = daysBetween(p.startDate, p.endDate);
      let formula = '';
      let result = '';

      if (p.rateType === 'custom') {
        const rate = parseFloat(p.rate) || 0;
        formula = `${principal}元 × ${rate}% ÷ 365天 × ${days}天`;
        result = formatMoney(principal * rate / 100 / 365 * days);
        detailHtml += `<div class="calc-step"><strong>本金 ${idx + 1}: ${formatMoney(principal)}</strong><br>起算日: ${p.startDate}，截止日: ${p.endDate}，共 ${days} 天<br><span class="formula">公式: ${formula}</span><br>利息: ${result}</div>`;
      } else {
        // LPR利率 - 只在LPR变化时显示分段
        let lprDetails = '';
        let totalInterestCalc = 0;
        let currentDate = new Date(p.startDate);
        let currentRate = getLPRForDate(p.startDate, p.lprTerm) || 3.65;
        let segStartDate = p.startDate;
        let prevRate = currentRate;

        for (let i = 0; i < LPR_DATA.length; i++) {
          const lprDate = new Date(LPR_DATA[i].date);
          if (lprDate <= new Date(p.startDate)) continue;
          if (lprDate > new Date(p.endDate)) break;

          const newRate = p.lprTerm === '5y+' ? LPR_DATA[i].lpr5y : LPR_DATA[i].lpr1y;

          // 如果利率变化了，说明前一段结束
          if (Math.abs(newRate - prevRate) > 0.001) {
            const segDays = daysBetween(segStartDate, lprDate.toISOString().split('T')[0]);
            if (segDays > 0) {
              const segInterest = principal * prevRate / 100 / 365 * segDays;
              totalInterestCalc += segInterest;
              lprDetails += `<div style="font-size:11px;padding-left:8px;opacity:0.8;">${segStartDate} ~ ${lprDate.toISOString().split('T')[0]}: LPR ${prevRate}% × ${segDays}天 = ${formatMoney(segInterest)}</div>`;
            }
            segStartDate = lprDate.toISOString().split('T')[0];
            prevRate = newRate;
          }

          currentDate = lprDate;
        }

        // 最后一段
        const lastDays = daysBetween(segStartDate, p.endDate);
        if (lastDays > 0) {
          const lastInterest = principal * prevRate / 100 / 365 * lastDays;
          totalInterestCalc += lastInterest;
          lprDetails += `<div style="font-size:11px;padding-left:8px;opacity:0.8;">${segStartDate} ~ ${p.endDate}: LPR ${prevRate}% × ${lastDays}天 = ${formatMoney(lastInterest)}</div>`;
        }

        formula = `本金 ${principal}元，LPR利率，期间共 ${days} 天`;
        result = formatMoney(totalInterestCalc);
        detailHtml += `<div class="calc-step"><strong>本金 ${idx + 1}: ${formatMoney(principal)}</strong><br>起算日: ${p.startDate}，截止日: ${p.endDate}，共 ${days} 天<br><span class="formula">${lprDetails}</span><br>小计: ${result}</div>`;
      }
    });
    document.getElementById('interest-calc-detail').innerHTML = detailHtml;
  }

          <div class="field-input"><input type="date" class="date-input" value="${r.date}" onchange="updateRepayment(${r.id}, 'date', this.value)" oninput="validateDateInput(this)" /></div>
        </div>
        <div class="field-row">
          <span class="field-label">还款额</span>
          <div class="field-input"><input type="number" class="date-input" value="${r.amount}" placeholder="还款金额" onchange="updateRepayment(${r.id}, 'amount', this.value)" /></div>
        </div>
      </div>
    `).join('');
  }

  function updateRepayment(id, field, value) {
    const r = repayments.find(x => x.id === id);
    if (r) r[field] = value;
  }

  function toggleMultiCase() {
    isMultiCase = document.getElementById('multi-case').checked;
  }

  // 执行款计算
  function calculateExecution() {
    if (cases.length === 0) {
      document.getElementById('execution-placeholder').style.display = '';
      document.getElementById('execution-result').classList.remove('visible');
      return;
    }

    const includeDelayedInterest = document.getElementById('delayed-interest').checked;
    const multiCaseEnabled = document.getElementById('multi-case').checked;

    // 整理原始案件数据（不合并，只取有本金的案件）
    const rawCases = [];
    for (const c of cases) {
      const principal = parseFloat(c.principal) || 0;
      if (principal <= 0) continue;
      rawCases.push({
        id: c.id,
        name: c.name || '案件' + (rawCases.length + 1),
        principal,
        rate: c.rateType === 'lpr' ? (getLPRForDate(c.dueDate, c.lprTerm) || 3.65) : (parseFloat(c.rate) || 0),
        rateType: c.rateType,
        lprTerm: c.lprTerm,
        startDate: c.dueDate || '',          // 一般债务利息起算日
        endDate: c.endDate || new Date().toISOString().split('T')[0],
        litigationFee: parseFloat(c.litigationFee) || 0,
        lawyerFee: parseFloat(c.lawyerFee) || 0,
        otherFee: parseFloat(c.otherFee) || 0
      });
    }
    if (rawCases.length === 0) {
      document.getElementById('execution-placeholder').style.display = '';
      document.getElementById('execution-result').classList.remove('visible');
      return;
    }

    // 整理还款记录，按日期从早到晚排序
    const sortedRepayments = repayments
      .filter(r => r.date && r.amount && parseFloat(r.amount) > 0)
      .map(r => ({ date: r.date, amount: parseFloat(r.amount) }))
      .sort((a, b) => new Date(a.date) - new Date(b.date));

    // ================================================================
    // 以下按照用户提供的五阶段逻辑实现
    // ================================================================

    /**
     * 五阶段计算单个案件（或汇总案件组）的执行款
     * @param {object} caseInfo - { principal, rate, startDate, endDate, litigationFee, lawyerFee, otherFee }
     * @param {Array}  repayments - 排序后的还款记录
     * @param {boolean} includeDelayed
     * @returns {object} { remainingPrincipal, accumulatedInterest, accumulatedDelayed, remainingFees, steps }
     */
    function calcFiveStage(caseInfo, repayments, includeDelayed) {
      // ---- 第一阶段：输入参数 ----
      const principal0    = caseInfo.principal;  // 输入本金
      const annualRate     = caseInfo.rate;        // 年利率（%）
      const startDate      = caseInfo.startDate;   // 一般债务利息起算日
      const endDate0       = caseInfo.endDate;    // 计算截止日
      const litigationFee  = caseInfo.litigationFee;
      const lawyerFee      = caseInfo.lawyerFee;
      const otherFee       = caseInfo.otherFee;
      const totalFees      = litigationFee + lawyerFee + otherFee;

      // 日利率
      const dailyRate = annualRate / 100 / 365;
      // 迟延履行加倍利息日利率（万分之一）
      const delayedDailyRate = 0.000175;

      // ---- 第二阶段：初始化 ----
      let remainingPrincipal   = principal0;   // 剩余本金
      let accumulatedInterest  = 0;             // 已产生但尚未清偿的一般债务利息累计额
      let remainingFees        = totalFees;      // 未付费用
      let lastInterestDate     = startDate;      // 上次计息截止日
      const steps = [];                          // 计算过程记录

      // ---- 第三阶段：逐笔还款处理 ----
      // 对每一笔还款（按日期从早到晚）：
      // 1. 计算新增利息 = 剩余本金 × 日利率 × 天数
      // 2. 累加到利息累计额
      // 3. 拿还款金额，按法定顺序抵扣（费用 > 利息 > 本金）
      // 4. 更新"上次计息截止日"
      // 5. 记录抵扣明细
      for (const rep of repayments) {
        const repDate = rep.date;
        const repAmount = rep.amount;

        // 1) 计算从上次计息截止日到本次还款日的新增利息
        const daysSinceLast = daysBetween(lastInterestDate, repDate);
        const newInterest = remainingPrincipal * dailyRate * daysSinceLast;
        accumulatedInterest += newInterest;

        // 记录本次计息
        const step = {
          repDate,
          repAmount,
          daysSinceLast,
          newInterest,
          principalBefore: remainingPrincipal,
          accumulatedInterestBefore: accumulatedInterest - newInterest,
          deductions: []
        };

        // 2) 按法定顺序抵扣：费用 → 利息 → 本金
        let remaining = repAmount;

        // 优先抵扣：未付费用
        if (remainingFees > 0 && remaining > 0) {
          const used = Math.min(remainingFees, remaining);
          remainingFees -= used;
          remaining -= used;
          step.deductions.push({ type: '费用', amount: used });
        }

        // 优先抵扣：已累计的一般债务利息
        if (accumulatedInterest > 0 && remaining > 0) {
          const used = Math.min(accumulatedInterest, remaining);
          accumulatedInterest -= used;
          remaining -= used;
          step.deductions.push({ type: '一般利息', amount: used });
        }

        // 优先抵扣：本金
        if (remainingPrincipal > 0 && remaining > 0) {
          const used = Math.min(remainingPrincipal, remaining);
          remainingPrincipal -= used;
          remaining -= used;
          step.deductions.push({ type: '本金', amount: used });
        }

        // 4) 更新"上次计息截止日"为本次还款日
        lastInterestDate = repDate;

        step.remainingFeesAfter = remainingFees;
        step.accumulatedInterestAfter = accumulatedInterest;
        step.remainingPrincipalAfter = remainingPrincipal;
        steps.push(step);
      }

      // ---- 第四阶段：末段利息 ----
      // 计算从最后还款日（或无还款则从起算日）到计算截止日的利息
      const finalStartDate = repayments.length > 0
        ? repayments[repayments.length - 1].date
        : startDate;
      const finalDays = daysBetween(finalStartDate, endDate0);
      const finalInterest = remainingPrincipal * dailyRate * finalDays;
      accumulatedInterest += finalInterest;

      // ---- 第五阶段：迟延履行加倍利息 ----
      // 从计算起始日到截止日，按还款日期分段计算
      let accumulatedDelayed = 0;
      const doubleSegments = []; // 记录分段详情用于显示
      if (includeDelayed) {
        let delayedPrincipal = principal0;
        let lastDelayedDate = startDate;

        for (const rep of repayments) {
          const repDate = rep.date;
          const segStart = lastDelayedDate;
          const segEnd = repDate;
          const segDays = daysBetween(segStart, segEnd);
          if (segDays > 0) {
            const segInterest = delayedPrincipal * delayedDailyRate * segDays;
            accumulatedDelayed += segInterest;
            doubleSegments.push({ start: segStart, end: segEnd, days: segDays, principal: delayedPrincipal, interest: segInterest });
          }

          let remaining = rep.amount;
          const usedFee = Math.min(totalFees, remaining);
          remaining -= usedFee;
          const usedInt = Math.min(accumulatedInterest, remaining);
          remaining -= usedInt;
          const usedPrin = Math.min(delayedPrincipal, remaining);
          delayedPrincipal -= usedPrin;

          lastDelayedDate = repDate;
        }

        const lastRepDate = repayments.length > 0 ? repayments[repayments.length - 1].date : startDate;
        const lastDelayedDays = daysBetween(lastRepDate, endDate0);
        if (lastDelayedDays > 0) {
          const lastSegInterest = delayedPrincipal * delayedDailyRate * lastDelayedDays;
          accumulatedDelayed += lastSegInterest;
          doubleSegments.push({ start: lastRepDate, end: endDate0, days: lastDelayedDays, principal: delayedPrincipal, interest: lastSegInterest });
        }
      }

      // ---- 第六阶段：汇总结果 ----
      const total = remainingPrincipal + accumulatedInterest + accumulatedDelayed + remainingFees;

      return {
        remainingPrincipal,
        accumulatedInterest,
        accumulatedDelayed,
        remainingFees,
        finalDays,
        finalInterest,
        total,
        steps,
        doubleSegments
      };
    }

    // ================================================================
    // 根据多案模式执行计算
    // ================================================================
    let finalBreakdown = [];  // 各案件的最终结果
    let totalPrincipalSum  = 0;
    let totalInterestSum    = 0;
    let totalDelayedSum     = 0;
    let totalFeesSum        = 0;
    let totalResultSum      = 0;

    if (multiCaseEnabled) {
      // ---- 多案合并计算 ----
      // 汇总参数
      const totalPrincipal = rawCases.reduce((s, c) => s + c.principal, 0);
      const totalFeesVal   = rawCases.reduce((s, c) => s + c.litigationFee + c.lawyerFee + c.otherFee, 0);
      // 取最早起算日、最晚截止日
      const mergedStartDate = rawCases.map(c => c.startDate).filter(d => d).sort()[0] || '';
      const mergedEndDate   = rawCases.map(c => c.endDate).filter(d => d).sort().reverse()[0] || new Date().toISOString().split('T')[0];
      // 使用第一个案件的利率（多案共用同一日利率）
      const mergedRate = rawCases[0].rate;

      const merged = calcFiveStage({
        principal: totalPrincipal,
        rate: mergedRate,
        startDate: mergedStartDate,
        endDate: mergedEndDate,
        litigationFee: rawCases.reduce((s, c) => s + c.litigationFee, 0),
        lawyerFee:     rawCases.reduce((s, c) => s + c.lawyerFee, 0),
        otherFee:      rawCases.reduce((s, c) => s + c.otherFee, 0)
      }, sortedRepayments, includeDelayedInterest);

      totalPrincipalSum = merged.remainingPrincipal;
      totalInterestSum  = merged.accumulatedInterest;
      totalDelayedSum   = merged.accumulatedDelayed;
      totalFeesSum      = merged.remainingFees;
      totalResultSum    = merged.total;

      finalBreakdown.push({
        name: '多案合并',
        principal: totalPrincipal,
        remainingPrincipal: merged.remainingPrincipal,
        remainingFees: merged.remainingFees,
        accumulatedInterest: merged.accumulatedInterest,
        accumulatedDelayed: merged.accumulatedDelayed,
        total: merged.total,
        steps: merged.steps,
        finalDays: merged.finalDays,
        finalInterest: merged.finalInterest,
        rawCases
      });
    } else {
      // ---- 逐案独立计算 ----
      for (const c of rawCases) {
        const r = calcFiveStage({
          principal: c.principal,
          rate: c.rate,
          startDate: c.startDate,
          endDate: c.endDate,
          litigationFee: c.litigationFee,
          lawyerFee: c.lawyerFee,
          otherFee: c.otherFee
        }, sortedRepayments, includeDelayedInterest);

        totalPrincipalSum += r.remainingPrincipal;
        totalInterestSum  += r.accumulatedInterest;
        totalDelayedSum   += r.accumulatedDelayed;
        totalFeesSum      += r.remainingFees;
        totalResultSum    += r.total;

        finalBreakdown.push({
          name: c.name,
          principal: c.principal,
          remainingPrincipal: r.remainingPrincipal,
          remainingFees: r.remainingFees,
          accumulatedInterest: r.accumulatedInterest,
          accumulatedDelayed: r.accumulatedDelayed,
          total: r.total,
          steps: r.steps,
          finalDays: r.finalDays,
          finalInterest: r.finalInterest
        });
      }
    }

    // ================================================================
    // 生成对外展示（保持原有样式）
    // ================================================================
    document.getElementById('execution-placeholder').style.display = 'none';
    document.getElementById('execution-result').classList.add('visible');
    document.getElementById('execution-total').textContent = formatMoney(totalResultSum);

    // 分项汇总
    const summaryRows = `
      ${totalPrincipalSum > 0 ? `<div class="result-row"><span class="label">剩余本金</span><span class="value">${formatMoney(totalPrincipalSum)}</span></div>` : ''}
      ${totalInterestSum > 0 ? `<div class="result-row"><span class="label">一般债务利息</span><span class="value">${formatMoney(totalInterestSum)}</span></div>` : ''}
      ${includeDelayedInterest && totalDelayedSum > 0 ? `<div class="result-row"><span class="label">迟延履行加倍利息</span><span class="value">${formatMoney(totalDelayedSum)}</span></div>` : ''}
      ${totalFeesSum > 0 ? `<div class="result-row"><span class="label">未付费用</span><span class="value">${formatMoney(totalFeesSum)}</span></div>` : ''}
    `;
    document.getElementById('execution-breakdown').innerHTML = summaryRows;

    // 生成详细计算过程
    let detailHtml = '<div class="calc-detail-title">计算过程</div>';

    for (const item of finalBreakdown) {
      const rateVal = item.rawCases ? item.rawCases[0].rate : (
        finalBreakdown.length === 1 ? (rawCases[0] ? rawCases[0].rate : 0) : 0
      );
      const startDate = item.rawCases
        ? (item.rawCases.map(c => c.startDate).filter(d => d).sort()[0] || '')
        : (rawCases.find(c => c.name === item.name) || {}).startDate || '';
      const endDate = item.rawCases
        ? (item.rawCases.map(c => c.endDate).filter(d => d).sort().reverse()[0] || '')
        : (rawCases.find(c => c.name === item.name) || {}).endDate || '';
      const annualRateDisplay = rateVal ? rateVal.toFixed(2) + '%' : '—';
      const dailyRateDisplay  = rateVal ? (rateVal / 100 / 365).toFixed(6) + '%/天' : '—';

      detailHtml += `<div class="calc-step"><strong>${item.name}</strong><br>`;
      detailHtml += `本金: ${formatMoney(item.principal)}<br>`;
      if (startDate && endDate) {
        detailHtml += `期间: ${startDate} ~ ${endDate}（${daysBetween(startDate, endDate)}天）<br>`;
      }
      detailHtml += `年利率: ${annualRateDisplay}（日利率: ${dailyRateDisplay}）<br>`;
      detailHtml += `<span class="formula">────── 逐笔还款处理 ──────</span><br>`;

      if (item.steps.length === 0) {
        detailHtml += `<span style="font-size:11px;opacity:0.7;">（无还款记录，跳过）</span><br>`;
      } else {
        for (const step of item.steps) {
          const repNewInt = step.newInterest > 0
            ? `<span class="formula">新增利息: ${formatMoney(step.newInterest)}</span><br>`
            : '';
          detailHtml += `<strong>${step.repDate} 还款 ${formatMoney(step.repAmount)}</strong> `;
          detailHtml += `（距上次计息日 ${step.daysSinceLast}天，剩余本金 ${formatMoney(step.principalBefore)}）<br>`;
          detailHtml += repNewInt;
          for (const ded of step.deductions) {
            detailHtml += `<span class="formula">→ 抵扣${ded.type}: ${formatMoney(ded.amount)}</span><br>`;
          }
          detailHtml += `抵扣后：费用${formatMoney(step.remainingFeesAfter)} + 利息${formatMoney(step.accumulatedInterestAfter)} + 本金${formatMoney(step.remainingPrincipalAfter)}<br>`;
        }
      }

      detailHtml += `<span class="formula">────── 末段利息 ──────</span><br>`;
      if (item.finalDays > 0) {
        const finalRate = rateVal / 100 / 365;
        detailHtml += `<span class="formula">末段: ${formatMoney(item.remainingPrincipal)} × ${finalRate.toFixed(6)} × ${item.finalDays}天 = ${formatMoney(item.finalInterest)}</span><br>`;
      } else {
        detailHtml += `<span class="formula">（无需计算末段利息）</span><br>`;
      }

      if (includeDelayedInterest) {
        detailHtml += `<span class="formula">────── 迟延履行加倍利息 ──────</span><br>`;
        detailHtml += `<span class="formula">日利率: 0.000175（万分之一/天）</span><br>`;
        // 显示分段计算明细
        if (item.doubleSegments && item.doubleSegments.length > 0) {
          for (const seg of item.doubleSegments) {
            detailHtml += `<span class="formula">${seg.start} ~ ${seg.end}: ${formatMoney(seg.principal)} × 0.000175 × ${seg.days}天 = ${formatMoney(seg.interest)}</span><br>`;
          }
        }
        detailHtml += `累计加倍利息: ${formatMoney(item.accumulatedDelayed)}<br>`;
      }

      detailHtml += `<span class="formula">────── 汇总结果 ──────</span><br>`;
      detailHtml += `剩余本金: ${formatMoney(item.remainingPrincipal)}<br>`;
      detailHtml += `一般利息: ${formatMoney(item.accumulatedInterest)}<br>`;
      if (includeDelayedInterest) {
        detailHtml += `加倍利息: ${formatMoney(item.accumulatedDelayed)}<br>`;
      }
      if (item.remainingFees > 0) {
        detailHtml += `未付费用: ${formatMoney(item.remainingFees)}<br>`;
      }
      detailHtml += `<strong>小计: ${formatMoney(item.total)}</strong><br></div>`;
    }

    document.getElementById('execution-calc-detail').innerHTML = detailHtml;
  }

  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
    document.body.style.overflow = '';
  }

  function onOverlayClick(e) {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  }

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
  });

  // 初始化
  init();

  // 切换计算过程显示
  function toggleCalcDetail(type) {
    const detailEl = document.getElementById(type + '-calc-detail');
    const btn = detailEl.previousElementSibling;
    if (detailEl.classList.contains('visible')) {
      detailEl.classList.remove('visible');
      btn.textContent = '查看计算过程';
    } else {
      detailEl.classList.add('visible');
      btn.textContent = '收起计算过程';
    }
  }
</script>
</body>
</html>
