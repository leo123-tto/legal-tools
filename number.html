<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>数字大写转换器 - 江苏漫修律师事务所</title>
<style>
  :root {
    --accent: #4F6AF0;
    --accent-light: #6B82F5;
    --accent-dark: #3D56D4;
    --bg: linear-gradient(180deg, #EDF0F8 0%, #F0F1F5 100%);
    --text: #1A1D2E;
    --text-muted: rgba(60, 68, 90, 0.8);
    --border: rgba(80, 90, 130, 0.12);
    --card: rgba(255, 255, 255, 0.88);
    --success: #059669;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    color: var(--text);
    font-size: 15px;
    padding-bottom: 32px;
  }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 12px 16px;
    color: var(--accent);
    font-size: 14px;
    text-decoration: none;
    font-weight: 500;
  }

  .back-link:active { opacity: 0.7; }

  .container {
    max-width: 480px;
    margin: 0 auto;
    padding: 0 16px;
  }

  .header {
    text-align: center;
    padding: 4px 0 20px;
  }

  .header h1 {
    font-size: 22px;
    font-weight: 700;
    color: var(--accent-dark);
    letter-spacing: 0.02em;
  }

  .header p {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  /* Input card */
  .input-card {
    background: var(--card);
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 2px 12px rgba(79,106,240,0.06);
    margin-bottom: 14px;
  }

  .input-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 10px;
  }

  .input-row {
    display: flex;
    align-items: center;
    gap: 0;
    border: 2px solid rgba(80, 90, 130, 0.12);
    border-radius: 14px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .input-row:focus-within {
    border-color: var(--accent-light);
  }

  #numberInput {
    flex: 1;
    border: none;
    outline: none;
    font-size: 28px;
    font-weight: 600;
    color: var(--text);
    padding: 14px 16px;
    background: transparent;
    min-width: 0;
    letter-spacing: 0.01em;
    font-variant-numeric: tabular-nums;
  }

  #numberInput::placeholder {
    color: rgba(100,110,135,0.4);
    font-weight: 400;
    font-size: 22px;
  }

  .input-suffix {
    padding: 0 16px 0 4px;
    font-size: 20px;
    font-weight: 600;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .clear-btn {
    background: none;
    border: none;
    padding: 14px 12px;
    cursor: pointer;
    color: rgba(100,110,135,0.5);
    display: none;
    align-items: center;
    font-size: 18px;
    line-height: 1;
  }

  .clear-btn.visible { display: flex; }
  .clear-btn:active { opacity: 0.6; }

  /* Result card */
  .result-card {
    background: linear-gradient(135deg, #4F6AF0 0%, #9B6FE8 60%, #6B82F5 100%);
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 4px 20px rgba(79,106,240,0.2);
    margin-bottom: 14px;
    position: relative;
    min-height: 90px;
  }

  .result-label {
    font-size: 11px;
    font-weight: 600;
    color: rgba(255,255,255,0.65);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 10px;
  }

  #resultText {
    font-size: 22px;
    font-weight: 700;
    color: #FFFFFF;
    line-height: 1.4;
    word-break: break-all;
    min-height: 32px;
    letter-spacing: 0.03em;
  }

  #resultText.placeholder {
    color: rgba(255,255,255,0.35);
    font-size: 16px;
    font-weight: 400;
  }

  .readout-row {
    margin-top: 10px;
    font-size: 13px;
    color: rgba(255,255,255,0.65);
    min-height: 20px;
  }

  .copy-btn {
    position: absolute;
    right: 16px;
    bottom: 16px;
    background: rgba(255,255,255,0.18);
    border: 1px solid rgba(255,255,255,0.35);
    border-radius: 10px;
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    padding: 7px 14px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    letter-spacing: 0.02em;
  }

  .copy-btn:active { transform: scale(0.96); }

  .copy-btn.success {
    background: rgba(5,150,105,0.45);
    border-color: rgba(5,150,105,0.6);
  }

  /* Reference table */
  .ref-card {
    background: var(--card);
    border-radius: 20px;
    padding: 16px 20px;
    box-shadow: 0 2px 12px rgba(79,106,240,0.04);
    margin-bottom: 14px;
  }

  .ref-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 12px;
  }

  .ref-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
  }

  .ref-item {
    background: rgba(240, 242, 248, 0.6);
    border-radius: 10px;
    padding: 8px 4px 6px;
    text-align: center;
  }

  .ref-casual {
    font-size: 16px;
    font-weight: 600;
    color: var(--text-muted);
    line-height: 1;
  }

  .ref-arrow {
    font-size: 10px;
    color: rgba(100,110,135,0.5);
    margin: 2px 0;
    line-height: 1;
  }

  .ref-formal {
    font-size: 16px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }

  .ref-label {
    font-size: 10px;
    color: rgba(100,110,135,0.5);
    margin-top: 2px;
    line-height: 1;
  }

  /* Footer */
  footer {
    text-align: center;
    padding-top: 8px;
  }

  footer p {
    font-size: 12px;
    color: rgba(100,110,135,0.5);
    line-height: 1.6;
  }

  /* Error state */
  #errorMsg {
    font-size: 12px;
    color: #DC2626;
    margin-top: 6px;
    min-height: 16px;
    padding-left: 2px;
  }
</style>
</head>
<body>

<a href="index.html" class="back-link">← 返回工具首页</a>

<div class="container">

  <div class="header">
    <h1>数字大写转换器</h1>
    <p>数字转中文大写 · 实时转换</p>
  </div>

  <!-- Input -->
  <div class="input-card">
    <div class="input-label">输入金额</div>
    <div class="input-row">
      <input
        id="numberInput"
        type="text"
        inputmode="decimal"
        placeholder="0.00"
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
      >
      <button class="clear-btn" id="clearBtn" aria-label="清除">✕</button>
      <div class="input-suffix">元</div>
    </div>
    <div id="errorMsg"></div>
  </div>

  <!-- Result -->
  <div class="result-card">
    <div class="result-label">大写金额</div>
    <div id="resultText" class="placeholder">请输入金额</div>
    <div class="readout-row" id="readoutText"></div>
    <button class="copy-btn" id="copyBtn">复制</button>
  </div>

  <!-- Reference -->
  <div class="ref-card">
    <div class="ref-title">数字对照表</div>
    <div class="ref-grid" id="refGrid"></div>
  </div>

  <footer>
    <p>江苏漫修（无锡）律师事务所 刘成律师</p>
    <p>仅供参考，不构成法律意见</p>
  </footer>

</div>

<script>
// ============================================================
// Core conversion functions
// ============================================================

function numberToChineseUppercase(num) {
    const units = ['', '拾', '佰', '仟'];
    const bigUnits = ['', '万', '亿', '兆'];
    const digits = ['零', '壹', '贰', '叁', '肆', '伍', '陆', '柒', '捌', '玖'];

    let integer = Math.floor(num);
    let result = '';
    let unitPos = 0;
    let needZero = false;

    if (integer === 0) {
        // handled below with decimal
    } else {
        while (integer > 0) {
            let section = integer % 10000;
            let sectionStr = '';
            let unit = 0;
            if (section === 0) {
                needZero = true;
            } else {
                let tempStr = '';
                while (section > 0) {
                    let digit = section % 10;
                    if (digit === 0) {
                        if (tempStr !== '') tempStr = '零' + tempStr;
                    } else {
                        tempStr = digits[digit] + units[unit] + tempStr;
                    }
                    section = Math.floor(section / 10);
                    unit++;
                }
                sectionStr = tempStr + bigUnits[unitPos];
                if (needZero && result !== '') sectionStr = '零' + sectionStr;
                needZero = false;
            }
            if (sectionStr !== '') result = sectionStr + result;
            integer = Math.floor(integer / 10000);
            unitPos++;
        }

        result = result.replace(/零+/, '零').replace(/^零+/, '').replace(/零+$/, '');
        if (result === '') result = '零';
    }

    let decimal = Math.round((num - Math.floor(num)) * 100);
    let decimalStr = '';
    if (decimal > 0) {
        let jiao = Math.floor(decimal / 10);
        let fen = decimal % 10;
        if (jiao > 0) {
            decimalStr = digits[jiao] + '角';
            if (fen > 0) decimalStr += digits[fen] + '分';
            else decimalStr += '整';
        } else if (fen > 0) {
            decimalStr = '零' + digits[fen] + '分';
        }
    } else {
        decimalStr = '整';
    }

    if (result === '') result = '零';
    return result + '圆' + decimalStr;
}

function numberToChineseReadout(num) {
    const digits = ['零', '一', '二', '三', '四', '五', '六', '七', '八', '九'];
    const units = ['', '十', '百', '千'];
    const bigUnits = ['', '万', '亿', '兆'];

    let integer = Math.floor(num);
    if (integer === 0) return '零';

    let result = '';
    let unitPos = 0;
    let needZero = false;

    while (integer > 0) {
        let section = integer % 10000;
        let sectionStr = '';
        let unit = 0;
        if (section === 0) {
            needZero = true;
        } else {
            let tempStr = '';
            while (section > 0) {
                let digit = section % 10;
                if (digit === 0) {
                    if (tempStr !== '' && !tempStr.startsWith('零')) tempStr = '零' + tempStr;
                } else {
                    let unitStr = units[unit];
                    if (unit === 1 && digit === 1 && tempStr === '') unitStr = '十';
                    tempStr = digits[digit] + unitStr + tempStr;
                }
                section = Math.floor(section / 10);
                unit++;
            }
            sectionStr = tempStr + bigUnits[unitPos];
            if (needZero && result !== '') sectionStr = '零' + sectionStr;
            needZero = false;
        }
        if (sectionStr !== '') result = sectionStr + result;
        integer = Math.floor(integer / 10000);
        unitPos++;
    }

    result = result.replace(/零+/, '零').replace(/^零+/, '').replace(/零+$/, '');
    if (result === '') result = '零';
    return result;
}

// ============================================================
// UI Logic
// ============================================================

const input = document.getElementById('numberInput');
const resultText = document.getElementById('resultText');
const readoutText = document.getElementById('readoutText');
const copyBtn = document.getElementById('copyBtn');
const clearBtn = document.getElementById('clearBtn');
const errorMsg = document.getElementById('errorMsg');

const MAX_VALUE = 999999999999;

function sanitizeInput(raw) {
    // Allow digits and at most one decimal point, max 2 decimal places
    let val = raw.replace(/[^\d.]/g, '');
    // Remove extra dots
    let parts = val.split('.');
    if (parts.length > 2) {
        val = parts[0] + '.' + parts.slice(1).join('');
    }
    // Limit decimal to 2 places
    if (parts.length === 2) {
        val = parts[0] + '.' + parts[1].slice(0, 2);
    }
    return val;
}

function updateResult() {
    const raw = input.value.trim();
    errorMsg.textContent = '';

    if (raw === '' || raw === '.') {
        resultText.textContent = '请输入金额';
        resultText.className = 'placeholder';
        readoutText.textContent = '';
        clearBtn.classList.remove('visible');
        return;
    }

    clearBtn.classList.add('visible');

    const num = parseFloat(raw);
    if (isNaN(num)) {
        resultText.textContent = '请输入有效金额';
        resultText.className = 'placeholder';
        readoutText.textContent = '';
        return;
    }

    if (num < 0) {
        errorMsg.textContent = '请输入正数';
        resultText.textContent = '请输入有效金额';
        resultText.className = 'placeholder';
        readoutText.textContent = '';
        return;
    }

    if (num > MAX_VALUE) {
        errorMsg.textContent = '最大支持金额：9999亿';
        resultText.textContent = '金额超出范围';
        resultText.className = 'placeholder';
        readoutText.textContent = '';
        return;
    }

    const upper = numberToChineseUppercase(num);
    const casual = numberToChineseReadout(num);

    resultText.textContent = upper;
    resultText.className = '';

    // Format casual readout
    const decPart = raw.includes('.') ? raw.split('.')[1] : '';
    let readout = casual;
    if (decPart) {
        const jiao = parseInt(decPart[0] || '0');
        const fen = parseInt(decPart[1] || '0');
        const casualDigits = ['零','一','二','三','四','五','六','七','八','九'];
        if (jiao || fen) {
            readout += '点';
            if (jiao) readout += casualDigits[jiao];
            if (fen) readout += casualDigits[fen];
        }
    }
    readoutText.textContent = '读作：' + readout;
}

input.addEventListener('input', function (e) {
    const caret = this.selectionStart;
    const raw = this.value;
    const clean = sanitizeInput(raw);
    if (clean !== raw) {
        this.value = clean;
        // Restore caret roughly
        const diff = raw.length - clean.length;
        const newPos = Math.max(0, caret - diff);
        this.setSelectionRange(newPos, newPos);
    }
    updateResult();
});

input.addEventListener('keydown', function (e) {
    // Allow: backspace, delete, arrows, tab, enter
    if ([8, 9, 13, 37, 38, 39, 40, 46].includes(e.keyCode)) return;
    // Allow: Ctrl+A, C, V, X, Z
    if (e.ctrlKey || e.metaKey) return;
    // Block non-digit / non-dot
    if (!/[\d.]/.test(e.key)) e.preventDefault();
});

clearBtn.addEventListener('click', function () {
    input.value = '';
    clearBtn.classList.remove('visible');
    updateResult();
    input.focus();
});

let copyTimer = null;
copyBtn.addEventListener('click', function () {
    const text = resultText.textContent;
    if (!text || resultText.classList.contains('placeholder')) return;

    if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(showCopied).catch(fallbackCopy.bind(null, text));
    } else {
        fallbackCopy(text);
    }
});

function fallbackCopy(text) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    try { document.execCommand('copy'); showCopied(); } catch (_) {}
    document.body.removeChild(ta);
}

function showCopied() {
    copyBtn.textContent = '已复制 ✓';
    copyBtn.classList.add('success');
    if (copyTimer) clearTimeout(copyTimer);
    copyTimer = setTimeout(() => {
        copyBtn.textContent = '复制';
        copyBtn.classList.remove('success');
    }, 2000);
}

// ============================================================
// Reference table
// ============================================================

const refData = [
    { casual: '0', formal: '零', label: '' },
    { casual: '1', formal: '壹', label: '' },
    { casual: '2', formal: '贰', label: '' },
    { casual: '3', formal: '叁', label: '' },
    { casual: '4', formal: '肆', label: '' },
    { casual: '5', formal: '伍', label: '' },
    { casual: '6', formal: '陆', label: '' },
    { casual: '7', formal: '柒', label: '' },
    { casual: '8', formal: '捌', label: '' },
    { casual: '9', formal: '玖', label: '' },
    { casual: '十', formal: '拾', label: '' },
    { casual: '百', formal: '佰', label: '' },
    { casual: '千', formal: '仟', label: '' },
    { casual: '万', formal: '万', label: '' },
    { casual: '亿', formal: '亿', label: '' },
    { casual: '元', formal: '圆', label: '' },
    { casual: '角', formal: '角', label: '' },
    { casual: '分', formal: '分', label: '' },
    { casual: '整', formal: '整', label: '' },
    { casual: '兆', formal: '兆', label: '' },
];

const grid = document.getElementById('refGrid');
refData.forEach(item => {
    const div = document.createElement('div');
    div.className = 'ref-item';
    div.innerHTML =
        '<div class="ref-casual">' + item.casual + '</div>' +
        '<div class="ref-arrow">↓</div>' +
        '<div class="ref-formal">' + item.formal + '</div>';
    grid.appendChild(div);
});
</script>
</body>
</html>
