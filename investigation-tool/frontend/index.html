<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>执行背景调查</title>
    <style>
        :root {
            --bg-parchment: #f5f4ed;
            --bg-ivory: #faf9f5;
            --bg-white: #ffffff;
            --brand-terracotta: #c96442;
            --brand-coral: #d97757;
            --text-near-black: #141413;
            --text-olive-gray: #5e5d59;
            --text-stone-gray: #87867f;
            --border-cream: #f0eee6;
            --border-warm: #e8e6dc;
            --focus-blue: #3898ec;
            --error-crimson: #b53333;
            --success-green: #4f7a5a;
            --shadow-whisper: rgba(0, 0, 0, 0.05) 0px 4px 24px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            background: var(--bg-parchment);
            color: var(--text-near-black);
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: var(--bg-ivory);
            border-bottom: 1px solid var(--border-cream);
            padding: 0 24px;
            display: flex;
            align-items: center;
            gap: 0;
            height: 56px;
            flex-shrink: 0;
        }
        .header-title {
            font-family: -apple-system, "Songti SC", "SimSun", Georgia, serif;
            font-size: 18px;
            font-weight: 500;
            color: var(--text-near-black);
            margin-right: 32px;
            flex-shrink: 0;
        }
        .nav-tabs {
            display: flex;
            gap: 4px;
            height: 100%;
        }
        .nav-tab {
            display: flex;
            align-items: center;
            padding: 0 16px;
            height: 100%;
            font-size: 14px;
            color: var(--text-olive-gray);
            text-decoration: none;
            border-bottom: 2px solid transparent;
            cursor: pointer;
            transition: color 0.15s, border-color 0.15s;
        }
        .nav-tab:hover { color: var(--brand-terracotta); }
        .nav-tab.active {
            color: var(--brand-terracotta);
            border-bottom-color: var(--brand-terracotta);
            font-weight: 600;
        }
        .header-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--text-olive-gray);
        }
        .dot {
            width: 8px; height: 8px; border-radius: 50%;
        }
        .dot.online { background: var(--success-green); }
        .dot.offline { background: var(--error-crimson); }
        .dot.checking { background: var(--brand-terracotta); animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
        .main-content {
            flex: 1;
            overflow-y: auto;
        }
        iframe {
            width: 100%; height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>
    <header class="header">
        <span class="header-title">📋 执行背景调查</span>
        <nav class="nav-tabs">
            <a class="nav-tab active" data-page="investigation.html">🔍 调查</a>
            <a class="nav-tab" data-page="logs.html">📜 日志</a>
            <a class="nav-tab" data-page="status.html">📊 状态</a>
            <a class="nav-tab" data-page="config.html">⚙️ 配置</a>
        </nav>
        <div class="header-right">
            <div class="status-indicator">
                <span id="backendDot" class="dot checking"></span>
                <span id="backendText">后端启动中...</span>
            </div>
        </div>
    </header>
    <div class="main-content">
        <iframe id="contentFrame" src="investigation.html"></iframe>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@tauri-apps/api@2/dist/api.iife.min.js"></script>
    <script>
        const { invoke, listen } = window.__TAURI__;
        const backendDot = document.getElementById('backendDot');
        const backendText = document.getElementById('backendText');
        const contentFrame = document.getElementById('contentFrame');
        const navTabs = document.querySelectorAll('.nav-tab');

        // Backend status
        function updateBackendStatus(running) {
            backendDot.className = 'dot ' + (running ? 'online' : 'offline');
            backendText.textContent = running ? '后端已连接' : '后端未连接';
        }

        // Navigation
        navTabs.forEach(tab => {
            tab.addEventListener('click', (e) => {
                e.preventDefault();
                navTabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                contentFrame.src = tab.dataset.page;
            });
        });

        // Listen for Rust events
        listen('backend-status', (event) => {
            updateBackendStatus(event.payload.running);
        });

        listen('lm-studio-status', (event) => {
            // Forward to iframe
            contentFrame.contentWindow?.postMessage({ type: 'lm-studio-status', data: event.payload }, '*');
        });

        // Init: ask Rust for backend status
        invoke('get_backend_status').then(status => {
            updateBackendStatus(status.running);
        }).catch(() => {
            updateBackendStatus(false);
        });

        // Try starting backend if not running
        invoke('get_backend_status').then(status => {
            if (!status.running) {
                invoke('start_backend').then(() => {
                    // Status event will follow
                });
            }
        });
    </script>
</body>
</html>
